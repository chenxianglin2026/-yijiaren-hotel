version: "3.8"

services:
  # ── PostgreSQL 数据库 ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: yijiaren-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yijiaren}
      POSTGRES_USER: ${POSTGRES_USER:-yijiaren}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yijiaren123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yijiaren} -d ${POSTGRES_DB:-yijiaren}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yijiaren-net

  # ── FastAPI 后端应用 ───────────────────────────────
  app:
    build: .
    image: yjr:latest
    container_name: yijiaren-app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DEV_MODE=${DEV_MODE:-false}
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - WX_APPID=${WX_APPID}
      - WX_SECRET=${WX_SECRET}
      - WX_MCHID=${WX_MCHID}
      - WX_PAY_KEY=${WX_PAY_KEY}
      - WX_PAY_SERIAL=${WX_PAY_SERIAL}
      - WX_PAY_PRIVATE_KEY=${WX_PAY_PRIVATE_KEY}
      - WX_PAY_NOTIFY_URL=${WX_PAY_NOTIFY_URL}
      - TTLOCK_CLIENT_ID=${TTLOCK_CLIENT_ID}
      - TTLOCK_CLIENT_SECRET=${TTLOCK_CLIENT_SECRET}
    env_file:
      - .env
    expose:
      - "8000"
    networks:
      - yijiaren-net

  # ── Nginx 反向代理 + 静态文件 ─────────────────────
  nginx:
    image: nginx:alpine
    container_name: yijiaren-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - yijiaren-net

volumes:
  postgres_data:
    driver: local

networks:
  yijiaren-net:
    driver: bridge
