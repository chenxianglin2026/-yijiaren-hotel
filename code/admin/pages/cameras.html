<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>监控摄像头</title><link rel="stylesheet" href="../css/admin.css">
<style>.page{padding:16px}.title{font-size:18px;font-weight:700;margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.card{background:#000;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.15);position:relative;aspect-ratio:16/10}
.card-info{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.8));padding:16px;color:#fff;display:flex;justify-content:space-between;align-items:flex-end}
.card-name{font-size:14px;font-weight:600}.card-loc{font-size:11px;opacity:.7;margin-top:2px}
.card-status{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600}
.online{background:rgba(82,196,26,.3);color:#95de64}.offline{background:rgba(255,77,79,.3);color:#ff7875}
</style></head><body><div class="page"><div class="title">📷 监控摄像头</div><div class="grid" id="grid"></div></div>
<script>
fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:'admin',password:'admin123'})})
.then(function(r){return r.json()}).then(function(j){
return fetch('/api/cameras?page_size=50',{headers:{'Authorization':'Bearer '+j.access_token}})})
.then(function(r){return r.json()}).then(function(j){
var items=j.items||j.data||[];
if(!items.length){document.getElementById('grid').innerHTML='<div style=text-align:center;padding:40px;color:#999;grid-column:1/-1>暂无摄像头</div>';return}
var h='';
items.forEach(function(c){
h+='<div class=card><div class=card-info><div><div class=card-name>'+c.name+'</div><div class=card-loc>📍 '+c.location+' · '+c.ip+'</div></div><div><span class="card-status '+(c.status==='online'?'online':'offline')+'">'+(c.status==='online'?'在线':'离线')+'</span></div></div></div>';
});
document.getElementById('grid').innerHTML=h;
}).catch(function(e){document.getElementById('grid').innerHTML='<div style=text-align:center;padding:40px;color:#cf1322;grid-column:1/-1>加载失败: '+e.message+'</div>'});
</script></body></html>
