<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>保洁派单</title><link rel="stylesheet" href="../css/admin.css">
<style>.page{padding:16px}.title{font-size:18px;font-weight:700;margin-bottom:16px}
.stats{display:flex;gap:12px;margin-bottom:16px}.stat{padding:14px 20px;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);flex:1;text-align:center}.stat-val{font-size:24px;font-weight:700}.stat-lbl{font-size:12px;color:#999;margin-top:4px}
.card{background:#fff;border-radius:8px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:center;gap:12px}
.card-icon{font-size:24px;width:40px;text-align:center}.card-body{flex:1}.card-title{font-size:14px;font-weight:600}.card-meta{font-size:12px;color:#999;margin-top:4px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}.badge-pending{background:#fff7e6;color:#d48806}.badge-progress{background:#e6f7ff;color:#096dd9}.badge-done{background:#f6ffed;color:#389e0d}
.empty{text-align:center;padding:60px;color:#999}
</style></head><body><div class="page"><div class="title">🧹 保洁派单</div><div class="stats" id="stats"></div><div id="list"><div class=empty>加载中...</div></div></div>
<script>
var ICON={pending:'🕐',in_progress:'🧹',completed:'✅'};
var BADGE={pending:'badge-pending',in_progress:'badge-progress',completed:'badge-done'};
var LABEL={pending:'待处理',in_progress:'进行中',completed:'已完成'};
fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:'admin',password:'admin123'})})
.then(function(r){return r.json()}).then(function(j){
return fetch('/api/cleaning/tasks?page_size=100',{headers:{'Authorization':'Bearer '+j.access_token}})})
.then(function(r){return r.json()}).then(function(j){
var items=j.items||[];
if(!items.length){document.getElementById('list').innerHTML='<div class=empty>暂无工单</div>';return}
var s={total:items.length,pending:0,doing:0,done:0};
items.forEach(function(i){if(i.status==='pending')s.pending++;if(i.status==='in_progress')s.doing++;if(i.status==='completed')s.done++});
document.getElementById('stats').innerHTML='<div class=stat><div class=stat-val>'+s.total+'</div><div class=stat-lbl>总工单</div></div><div class=stat><div class=stat-val style=color:#d48806>'+s.pending+'</div><div class=stat-lbl>待处理</div></div><div class=stat><div class=stat-val style=color:#096dd9>'+s.doing+'</div><div class=stat-lbl>进行中</div></div><div class=stat><div class=stat-val style=color:#389e0d>'+s.done+'</div><div class=stat-lbl>已完成</div></div>';
var h='';
items.forEach(function(t){
h+='<div class=card><div class=card-icon>'+(ICON[t.status]||'📋')+'</div><div class=card-body><div class=card-title>'+t.room_number+' · '+(t.description||t.task_type||'清洁任务')+'</div><div class=card-meta>'+t.hotel_name+' · <span class="badge '+(BADGE[t.status]||'')+'">'+(LABEL[t.status]||t.status)+'</span></div></div></div>';
});
document.getElementById('list').innerHTML=h;
}).catch(function(e){document.getElementById('list').innerHTML='<div class=empty>加载失败: '+e.message+'</div>'});
</script></body></html>
