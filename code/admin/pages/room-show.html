<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>房型展示 · 维也纳标准</title>
<style>
:root{--gold:#C5A46B;--gold-dark:#B8933B;--gold-light:#E8D5A3;--gold-bg:rgba(197,164,107,.08);--bg:#F5F5F7;--bg-card:#FFFFFF;--text:#1A1A1A;--text-dim:#888888;--text-mid:#555555;--red:#E8553D;--red-tag:#C0392B;--tag-bg:rgba(197,164,107,.12);--tag-border:rgba(197,164,107,.25);--radius:12px;--shadow:0 2px 12px rgba(0,0,0,.06);--shadow-hover:0 6px 20px rgba(0,0,0,.10);--border:1px solid rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
/* Header */
.header{padding:16px 20px;display:flex;align-items:center;gap:12px;background:#fff;border-bottom:1px solid #eee;position:sticky;top:0;z-index:50}
.header-back{color:var(--gold);font-size:20px;cursor:pointer;text-decoration:none}
.header-title{font-size:17px;font-weight:700;color:var(--text)}
.header-sub{font-size:12px;color:var(--text-dim);margin-left:auto}
/* Video Banner */
.video-banner{margin:16px 16px 0;border-radius:var(--radius);overflow:hidden;position:relative;background:#1a1a1a;cursor:pointer;box-shadow:var(--shadow)}
.video-banner img{width:100%;height:200px;object-fit:cover;display:block;opacity:.7;transition:opacity .3s}
.video-banner:hover img{opacity:.9}
.video-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:1}
.video-play-btn{width:56px;height:56px;border-radius:50%;background:rgba(197,164,107,.9);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;transition:transform .2s,background .2s}
.video-banner:hover .video-play-btn{transform:scale(1.1);background:var(--gold)}
.video-label{font-size:13px;color:rgba(255,255,255,.9);font-weight:600;letter-spacing:1px}
.video-sub{font-size:11px;color:rgba(255,255,255,.6)}
/* Hotel Info Banner */
.hotel-banner{margin:16px;padding:20px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);position:relative;overflow:hidden}
.hotel-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold-light),var(--gold-dark))}
.hotel-banner-img{width:100%;height:160px;object-fit:cover;border-radius:8px;margin-bottom:14px}
.hotel-name{font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px}
.hotel-desc{font-size:13px;color:var(--text-mid);line-height:1.6;margin-bottom:12px}
.hotel-features{display:flex;flex-wrap:wrap;gap:6px}
.ftag{font-size:11px;padding:3px 10px;background:var(--gold-bg);color:var(--gold-dark);border-radius:20px;border:1px solid var(--tag-border)}
/* Room Cards */
.room-list{padding:0 16px;display:flex;flex-direction:column;gap:16px}
.room-card{background:var(--bg-card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);border:var(--border);transition:transform .2s,box-shadow .2s}
.room-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover)}
/* Room Image */
.room-img{height:200px;position:relative;overflow:hidden;background:#e8e8e8}
.room-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.room-card:hover .room-img img{transform:scale(1.03)}
.room-img-gold{position:absolute;top:12px;right:12px;font-size:11px;font-weight:700;color:var(--gold);background:rgba(255,255,255,.9);padding:4px 10px;border-radius:12px;z-index:1;box-shadow:0 2px 8px rgba(0,0,0,.1)}
/* Room Level Badge */
.room-level{position:absolute;top:12px;left:12px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:4px;z-index:1;backdrop-filter:blur(4px)}
.level-standard{background:rgba(197,164,107,.2);color:#8B6914}
.level-superior,.level-高级{background:rgba(197,164,107,.25);color:#8B6914}
.level-business,.level-商务{background:rgba(0,123,255,.15);color:#0056B3}
.level-deluxe,.level-豪华{background:rgba(197,164,107,.3);color:#8B6914}
.level-executive,.level-行政{background:rgba(192,57,43,.15);color:#A82010}
.level-舒适{background:rgba(46,204,113,.15);color:#1E7E34}
.level-雅致{background:rgba(155,89,182,.15);color:#7B3F8C}
.level-轻奢{background:rgba(197,164,107,.3);color:#8B6914}
/* Room Info */
.room-info{padding:16px}
.room-name-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.room-name{font-size:17px;font-weight:700;color:var(--text)}
.room-name-en{font-size:11px;color:var(--text-dim)}
.room-tags{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0}
.rtag{font-size:10px;padding:2px 8px;border-radius:10px}
.rtag-hot{background:rgba(232,85,61,.08);color:var(--red);border:1px solid rgba(232,85,61,.2)}
.rtag-gold{background:var(--gold-bg);color:var(--gold-dark);border:1px solid var(--tag-border)}
/* Core Info Row */
.core-info{display:flex;gap:16px;margin:10px 0;padding:10px 0;border-top:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0}
.core-item{text-align:center;flex:1}
.core-item .val{font-size:14px;font-weight:600;color:var(--gold-dark)}
.core-item .lbl{font-size:10px;color:var(--text-dim);margin-top:2px}
/* Desc */
.room-desc{font-size:13px;color:var(--text-mid);line-height:1.6;margin:10px 0}
/* Facilities — Three Levels */
.facilities{margin:10px 0}
.fac-section{margin-bottom:8px}
.fac-label{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:600}
.fac-icons{display:flex;flex-wrap:wrap;gap:6px}
.fac-icon{font-size:12px;padding:4px 10px;background:#f8f8f8;border-radius:6px;color:var(--text-mid);display:flex;align-items:center;gap:4px;border:1px solid #eee}
.fac-icon .fi{font-size:14px}
.fac-icon.has{color:#5A8A3C;background:rgba(170,192,128,.08);border-color:rgba(170,192,128,.2)}
/* Price Section */
.price-row{display:flex;align-items:baseline;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid #f0f0f0}
.price-left{display:flex;align-items:baseline;gap:6px}
.price-current{font-size:28px;font-weight:800;color:var(--red);font-family:'Helvetica Neue',sans-serif}
.price-unit{font-size:12px;color:var(--text-dim)}
.price-original{font-size:13px;color:var(--text-dim);text-decoration:line-through}
.price-discount{font-size:11px;font-weight:700;padding:2px 8px;background:rgba(232,85,61,.1);color:var(--red);border-radius:4px}
/* Perks */
.perks{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.perk{font-size:10px;padding:2px 8px;background:rgba(46,204,113,.08);color:#2E7D32;border-radius:10px}
/* Bottom Booking Bar */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-top:1px solid #eee;padding:12px 16px;display:flex;align-items:center;gap:12px;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.04)}
.bottom-price{flex:1}
.bottom-price .bp{font-size:24px;font-weight:800;color:var(--red)}
.bottom-price .bpu{font-size:11px;color:var(--text-dim)}
.btn-book{flex:none;padding:12px 36px;background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .2s;box-shadow:0 2px 8px rgba(197,164,107,.3)}
.btn-book:hover{opacity:.9;transform:translateY(-1px)}
/* Loading / Empty */
.loading{padding:60px 20px;text-align:center;color:var(--text-dim);font-size:14px}
/* Section Title */
.section-title{font-size:15px;font-weight:700;color:var(--text);padding:16px 16px 8px;display:flex;align-items:center;gap:8px}
/* Surroundings Grid */
.surround-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:0 16px 16px}
.surround-card{background:var(--bg-card);border-radius:8px;padding:12px;text-align:center;border:var(--border);box-shadow:var(--shadow)}
.surround-card .stype{font-size:20px;margin-bottom:4px}
.surround-card .sname{font-size:13px;font-weight:600;margin-bottom:2px;color:var(--text)}
.surround-card .sdist{font-size:10px;color:var(--text-dim)}
.surround-card .srate{font-size:11px;color:var(--gold)}
/* Reviews */
.review-list{padding:0 16px 16px;display:flex;flex-direction:column;gap:10px}
.review-card{background:var(--bg-card);border-radius:8px;padding:14px;border:var(--border);box-shadow:var(--shadow)}
.review-header{display:flex;justify-content:space-between;margin-bottom:6px}
.review-user{font-size:13px;font-weight:600;color:var(--text)}
.review-date{font-size:11px;color:var(--text-dim)}
.review-stars{color:var(--gold);font-size:12px;margin-bottom:4px}
.review-text{font-size:13px;color:var(--text-mid);line-height:1.5}
/* Responsive */
@media(min-width:768px){
  .room-list{display:grid;grid-template-columns:repeat(2,1fr);padding:0 24px;gap:20px}
  .room-card{display:flex;flex-direction:column}
  .room-img{height:240px}
  .hotel-banner{margin:20px 24px;padding:24px}
  .hotel-banner-img{height:200px}
  .video-banner{margin:20px 24px 0}
  .video-banner img{height:240px}
  .section-title{padding:20px 24px 12px}
  .surround-grid{padding:0 24px 20px}
  .review-list{padding:0 24px 20px}
}
@media(min-width:1024px){
  .room-list{grid-template-columns:repeat(3,1fr);max-width:1200px;margin:0 auto;padding:0}
  .hotel-banner{max-width:1200px;margin:20px auto}
  .video-banner{max-width:1200px;margin:20px auto}
  .section-title{max-width:1200px;margin:0 auto}
  .surround-grid{max-width:1200px;margin:0 auto}
  .review-list{max-width:1200px;margin:0 auto}
}
</style>
</head>
<body>
<script>if(!localStorage.getItem('yjr_token'))location.href='login.html';</script>

function facIcon(name){
  for(var k in FAC_ICONS){if(name.indexOf(k)>=0||k.indexOf(name)>=0) return FAC_ICONS[k];}
  return '✨';
}

function starStr(n){var s='';for(var i=1;i<=5;i++)s+=i<=n?'★':'☆';return s;}

function openVideo(){
  alert('酒店实景视频即将上线！\n敬请期待维也纳标准酒店巡礼。');
}

function renderHotel(d){
  var h=d.hotels||d.properties||[];
  if(!h.length) return;
  var hotel=h[0];
  document.getElementById('hotelName').textContent=hotel.name;
  
  var featHtml='';
  (hotel.features||[]).forEach(function(f){featHtml+='<span class=ftag>'+f+'</span>';});
  
  var fac=hotel.facilities;
  var facHtml='';
  if(fac&&typeof fac==='object'&&!Array.isArray(fac)){
    if(fac.core&&fac.core.length) facHtml+='<div class=fac-section><div class=fac-label>🏠 核心设施</div><div class=fac-icons>'+fac.core.map(function(f){return '<span class=\"fac-icon has\"><span class=fi>'+facIcon(f)+'</span>'+f+'</span>';}).join('')+'</div></div>';
    if(fac.upgrade&&fac.upgrade.length) facHtml+='<div class=fac-section><div class=fac-label>⭐ 升级设施</div><div class=fac-icons>'+fac.upgrade.map(function(f){return '<span class=\"fac-icon\"><span class=fi>'+facIcon(f)+'</span>'+f+'</span>';}).join('')+'</div></div>';
    if(fac.service&&fac.service.length) facHtml+='<div class=fac-section><div class=fac-label>🎁 酒店服务</div><div class=fac-icons>'+fac.service.map(function(f){return '<span class=\"fac-icon\"><span class=fi>'+facIcon(f)+'</span>'+f+'</span>';}).join('')+'</div></div>';
  }else if(Array.isArray(fac)){
    facHtml='<div class=fac-icons>'+fac.map(function(f){return '<span class=\"fac-icon\"><span class=fi>'+facIcon(f)+'</span>'+f+'</span>';}).join('')+'</div>';
  }
  
  document.getElementById('hotelBanner').innerHTML=
    '<img class=hotel-banner-img src=\"https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800&q=80\" alt=\"'+hotel.name+'\" loading=lazy>'+
    '<div class=hotel-name>'+hotel.name+'</div>'+
    '<div class=hotel-desc>'+(hotel.desc||'')+'</div>'+
    '<div class=hotel-features>'+featHtml+'</div>'+
    facHtml;
}

function renderRooms(galleries){
  var list=document.getElementById('roomList');
  if(!galleries||!galleries.length){list.innerHTML='<div class=loading>暂无房型数据</div>';return;}
  document.getElementById('roomCount').textContent=galleries.length+'个房型';
  
  var html='';
  galleries.forEach(function(r,idx){
    var level=r.level||'';
    var lvCls='level-'+level;
    var tagsHtml='';
    (r.tags||[]).forEach(function(t){
      var tc=t.indexOf('折')>=0||t.indexOf('减')>=0?'rtag-hot':'rtag-gold';
      tagsHtml+='<span class=\"rtag '+tc+'\">'+t+'</span>';
    });
    
    // Facilities
    var am=r.amenities;
    var facHtml='';
    if(am&&typeof am==='object'&&!Array.isArray(am)){
      if(am.core&&am.core.length) facHtml+='<div class=fac-section><div class=fac-label>🏠 核心设施</div><div class=fac-icons>'+am.core.map(function(f){return '<span class=\"fac-icon has\"><span class=fi>'+facIcon(f)+'</span>'+f+'</span>';}).join('')+'</div></div>';
      if(am.upgrade&&am.upgrade.length) facHtml+='<div class=fac-section><div class=fac-label>⭐ 升级设施</div><div class=fac-icons>'+am.upgrade.map(function(f){return '<span class=\"fac-icon\"><span class=fi>'+facIcon(f)+'</span>'+f+'</span>';}).join('')+'</div></div>';
      if(am.service&&am.service.length) facHtml+='<div class=fac-section><div class=fac-label>🎁 增值服务</div><div class=fac-icons>'+am.service.map(function(f){return '<span class=\"fac-icon\"><span class=fi>'+facIcon(f)+'</span>'+f+'</span>';}).join('')+'</div></div>';
    }else if(Array.isArray(am)){
      facHtml='<div class=fac-icons>'+am.map(function(f){return '<span class=\"fac-icon\"><span class=fi>'+facIcon(f)+'</span>'+f+'</span>';}).join('')+'</div>';
    }
    
    // Perks
    var perksHtml='';
    if(r.perks&&r.perks.length) perksHtml='<div class=perks>'+r.perks.map(function(p){return '<span class=perk>🎁 '+p+'</span>';}).join('')+'</div>';
    
    // Level + Feature display
    var feature=r.feature||'';
    var levelBadge=level+(feature?' · '+feature:'');
    
    // Cycle through real Unsplash room images
    var imgUrl=ROOM_IMAGES[idx % ROOM_IMAGES.length];
    
    html+=
    '<div class=room-card id=room-'+idx+'>'+
      '<div class=room-img>'+
        '<img src=\"'+imgUrl+'\" alt=\"'+r.room_name+'\" loading=lazy>'+
        (levelBadge?'<div class=\"room-level '+lvCls+'\">'+levelBadge+'</div>':'')+
        '<div class=room-img-gold>维也纳标准</div>'+
      '</div>'+
      '<div class=room-info>'+
        '<div class=room-name-row><span class=room-name>'+r.room_name+'</span>'+
        (r.name_en?'<span class=room-name-en>'+r.name_en+'</span>':'')+'</div>'+
        '<div class=room-tags>'+tagsHtml+'</div>'+
        '<div class=core-info>'+
          '<div class=core-item><div class=val>'+(r.bed_size||'—')+'</div><div class=lbl>床型</div></div>'+
          '<div class=core-item><div class=val>'+(r.area_m2||'—')+'m²</div><div class=lbl>面积</div></div>'+
          '<div class=core-item><div class=val>'+(r.occupancy||'—')+'人</div><div class=lbl>可住</div></div>'+
          '<div class=core-item><div class=val>'+(r.window||'—')+'</div><div class=lbl>窗户</div></div>'+
        '</div>'+
        '<div class=room-desc>'+(r.desc||'')+'</div>'+
        '<div class=facilities>'+facHtml+'</div>'+
        perksHtml+
        '<div class=price-row>'+
          '<div class=price-left>'+
            '<span class=price-current>¥'+(r.price||'—')+'</span>'+
            '<span class=price-unit>'+(r.price_unit||'/晚')+'</span>'+
            (r.original_price?'<span class=price-original>¥'+r.original_price+'</span>':'')+
            (r.discount?'<span class=price-discount>'+r.discount+'</span>':'')+
          '</div>'+
          '<button class=btn-book style=\"padding:8px 20px;font-size:13px\" onclick=\"selectRoom('+idx+','+r.price+')\">预订</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  });
  list.innerHTML=html;
  
  // Default select first room for bottom bar
  if(galleries.length>0){selectRoom(0,galleries[0].price);}
}

function renderSurroundings(items){
  var g=document.getElementById('surroundGrid');
  if(!items||!items.length){g.innerHTML='<div class=loading>暂无数据</div>';return;}
  g.innerHTML=items.map(function(s){
    return '<div class=surround-card><div class=stype>'+
      (s.type==='餐饮'?'🍜':s.type==='交通'?'🚇':s.type==='购物'?'🛍️':s.type==='景点'?'🏯':s.type==='娱乐'?'🎮':s.type==='医疗'?'🏥':'📍')+
      '</div><div class=sname>'+s.name+'</div><div class=sdist>'+s.distance+'</div><div class=srate>'+starStr(Math.round(s.rating||4))+' '+(s.rating||'')+'</div></div>';
  }).join('');
}

function renderReviews(items){
  var l=document.getElementById('reviewList');
  if(!items||!items.length){l.innerHTML='<div class=loading>暂无评价</div>';return;}
  l.innerHTML=items.map(function(r){
    return '<div class=review-card><div class=review-header><span class=review-user>'+r.user_name+'</span><span class=review-date>'+r.date+'</span></div><div class=review-stars>'+starStr(r.rating)+'</div><div class=review-text>'+r.content+'</div></div>';
  }).join('');
}

function selectRoom(idx,price){
  var cards=document.querySelectorAll('.room-card');
  cards.forEach(function(c,i){c.style.borderColor=i===idx?'rgba(197,164,107,.4)':'rgba(0,0,0,.06)';});
  document.getElementById('bottomPrice').textContent='¥'+(price||'--');
  document.getElementById('bottomBar').style.display='flex';
}

function bookRoom(){
  alert('预订功能即将上线！\n请通过小程序或致电前台完成预订。');
}

function loadAll(){
  var hotelEp=PROJ==='apartment'?'/properties':'/hotels';
  fetch(API+hotelEp).then(function(r){return r.json();}).then(renderHotel).catch(function(e){console.error(e);});
  fetch(API+'/gallery').then(function(r){return r.json();}).then(renderRooms).catch(function(e){document.getElementById('roomList').innerHTML='<div class=loading>加载失败: '+e.message+'</div>';});
  fetch(API+'/surrounding').then(function(r){return r.json();}).then(renderSurroundings).catch(function(){});
  fetch(API+'/reviews-show').then(function(r){return r.json();}).then(renderReviews).catch(function(){});
}

loadAll();
</script>
</body>
</html>
