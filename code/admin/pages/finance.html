<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../css/admin.css">
<style>
  .finance-summary { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
  .finance-card { background:var(--bg-card); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); }
  .fc-title { font-size:12px; color:var(--text-muted); margin-bottom:8px; }
  .fc-value { font-size:24px; font-weight:700; color:var(--text-primary); }
  .fc-sub { font-size:12px; margin-top:4px; }
  .highlight-green { color:var(--success) !important; }
  .loading-row td { text-align:center; color:var(--text-muted); padding:20px; }
  @media(max-width:768px){ .finance-summary{grid-template-columns:1fr 1fr;} }
</style>
</head>
<body>
<div class="page">
  <div class="page-title">财务报表</div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab(this,'daily')">日报表</div>
    <div class="tab" onclick="switchTab(this,'monthly')">月报表</div>
    <div class="tab" onclick="switchTab(this,'reconciliation')">对账管理</div>
  </div>

  <!-- ===== Daily ===== -->
  <div id="tab-daily">
    <div class="finance-summary" id="dailyCards"></div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">近7天营收明细</div>
        <button class="btn btn-outline btn-sm" onclick="exportCSV('daily')">📥 导出</button>
      </div>
      <div class="table-wrap"><table id="dailyTable"></table></div>
    </div>
  </div>

  <!-- ===== Monthly ===== -->
  <div id="tab-monthly" style="display:none;">
    <div class="finance-summary" id="monthlyCards"></div>
    <div class="card">
      <div class="card-header"><div class="card-title">月度统计</div></div>
      <div class="table-wrap"><table id="monthlyTable"></table></div>
    </div>
  </div>

  <!-- ===== Reconciliation ===== -->
  <div id="tab-reconciliation" style="display:none;">
    <div class="alert alert-info">ℹ️ 支付对账：核对各渠道订单金额与系统记录的一致性。</div>
    <div class="card">
      <div class="card-header"><div class="card-title">支付对账明细</div></div>
      <div class="table-wrap"><table id="reconTable"></table></div>
    </div>
  </div>
</div>

<script>
const T = localStorage.getItem('yjr_token');
if(!T){window.top.location.href='pages/login.html';}
const H = { 'Authorization':'Bearer '+T, 'Content-Type':'application/json' };
const F = n => '¥'+Number(n||0).toLocaleString('zh-CN',{minimumFractionDigits:0,maximumFractionDigits:0});

function toast(msg, type) {
  type = type || 'info';
  var c = document.getElementById('toastContainer');
  if (!c) { c = document.createElement('div'); c.id = 'toastContainer'; c.className = 'toast-container'; document.body.appendChild(c); }
  var t = document.createElement('div'); t.className = 'toast toast-' + type; t.textContent = msg;
  c.appendChild(t);
  setTimeout(function() { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(function() { t.remove(); }, 300); }, 3000);
}

function switchTab(el,id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['daily','monthly','reconciliation'].forEach(k=>document.getElementById('tab-'+k).style.display=k===id?'block':'none');
}

async function loadDaily(){
  try{
    let end = new Date(); end.setDate(end.getDate()+1);
    let start = new Date(); start.setDate(start.getDate()-6);
    let se = start.toISOString().slice(0,10), ee = end.toISOString().slice(0,10);
    let r = await fetch('/api/finance/daily?start_date='+se+'&end_date='+ee,{headers:H});
    if (r.status === 401) { window.top.location.href = 'pages/login.html'; return; }
    let j = await r.json();
    if(j.code!==0) throw new Error(j.msg);
    let d = j.data || [];

    // Summary cards
    let today = d.length?d[d.length-1]:{};
    let yesterday = d.length>1?d[d.length-2]:{};
    let totalRev = d.reduce((s,i)=>s+i.revenue,0);
    let totalOrd = d.reduce((s,i)=>s+i.total_orders,0);
    document.getElementById('dailyCards').innerHTML = [
      {t:'今日营收',v:F(today.revenue||0)},
      {t:'今日订单',v:today.total_orders||0},
      {t:'7天总营收',v:F(totalRev)},
      {t:'7天总订单',v:totalOrd}
    ].map(c=>`<div class="finance-card"><div class="fc-title">${c.t}</div><div class="fc-value" style="color:var(--gold-dark);">${c.v}</div></div>`).join('');

    // Table
    let rows = d.map(i=>`<tr><td>${i.date}</td><td class="text-center">${i.total_orders}</td><td class="text-center">${i.paid_orders}</td><td class="text-right" style="font-weight:700;">${F(i.revenue)}</td><td class="text-right">${F(i.avg_order_value)}</td></tr>`).reverse().join('');
    let foot = `<tr style="font-weight:700;background:#faf8f3;"><td>合计</td><td class="text-center">${totalOrd}</td><td class="text-center">${d.reduce((s,i)=>s+i.paid_orders,0)}</td><td class="text-right">${F(totalRev)}</td><td class="text-right">${F(totalOrd?totalRev/totalOrd:0)}</td></tr>`;
    document.getElementById('dailyTable').innerHTML = '<thead><tr><th>日期</th><th>订单数</th><th>已支付</th><th>营收</th><th>客单价</th></tr></thead><tbody>'+rows+'</tbody><tfoot>'+foot+'</tfoot>';
  }catch(e){
    document.getElementById('dailyCards').innerHTML = '<div class="finance-card"><div class="fc-value" style="font-size:14px;color:var(--error);">加载失败</div></div>';
    toast('日报加载失败: '+e.message, 'error');
  }
}

async function loadMonthly(){
  try{
    let now = new Date();
    let r = await fetch('/api/finance/monthly?year='+now.getFullYear()+'&month='+(now.getMonth()+1),{headers:H});
    if (r.status === 401) { window.top.location.href = 'pages/login.html'; return; }
    let j = await r.json();
    if(j.code!==0) throw new Error(j.msg);
    let d = j.data||{};

    document.getElementById('monthlyCards').innerHTML = [
      {t:'本月营收',v:F(d.revenue||0)},
      {t:'本月订单',v:d.total_orders||0},
      {t:'已支付',v:d.paid_orders||0},
      {t:'客单价',v:F(d.avg_order_value||0)}
    ].map(c=>`<div class="finance-card"><div class="fc-title">${c.t}</div><div class="fc-value" style="color:var(--gold-dark);">${c.v}</div></div>`).join('');

    document.getElementById('monthlyTable').innerHTML = 
      '<thead><tr><th>指标</th><th class="text-right">数值</th></tr></thead><tbody>'+
      `<tr><td>总订单</td><td class="text-right">${d.total_orders||0}</td></tr>`+
      `<tr><td>已支付</td><td class="text-right">${d.paid_orders||0}</td></tr>`+
      `<tr><td>已完成</td><td class="text-right">${d.completed_orders||0}</td></tr>`+
      `<tr><td>已取消</td><td class="text-right">${d.cancelled_orders||0}</td></tr>`+
      `<tr style="font-weight:700;"><td>营收</td><td class="text-right" style="color:var(--gold-dark);">${F(d.revenue||0)}</td></tr>`+
      `<tr><td>客单价</td><td class="text-right">${F(d.avg_order_value||0)}</td></tr>`+
      '</tbody>';
  }catch(e){
    document.getElementById('monthlyCards').innerHTML = '<div class="finance-card"><div class="fc-value" style="font-size:14px;color:var(--error);">加载失败</div></div>';
    toast('月报加载失败: '+e.message, 'error');
  }
}

async function loadRecon(){
  try{
    let r = await fetch('/api/finance/reconciliation',{headers:H});
    if (r.status === 401) { window.top.location.href = 'pages/login.html'; return; }
    let j = await r.json();
    if(j.code!==0) throw new Error(j.msg);
    let d = j.data||[], s = j.summary||{};

    // Summary bar
    let totalAmt = d.reduce((s,i)=>s+(i.total_price||0),0);
    let html = `<div class="alert alert-success" style="margin-bottom:12px;">📊 对账统计：${d.length} 笔订单，总金额 ${F(totalAmt)}，已支付 ${s.paid_count||0} 笔 ${F(s.paid_amount||0)}，待支付 ${s.pending_count||0} 笔</div>`;

    // Table
    html += '<div class="table-wrap"><table><thead><tr><th>订单号</th><th>门店</th><th>客人</th><th class="text-right">金额</th><th>状态</th><th>入住日期</th><th>创建时间</th></tr></thead><tbody>';
    html += d.slice(0,50).map(i=>{
      let badge = i.status==='paid'?'badge-success':i.status==='pending'?'badge-warning':i.status==='completed'?'badge-info':'badge-error';
      return `<tr><td>${i.order_no}</td><td>${i.hotel_name}</td><td>${i.guest_name}</td><td class="text-right">${F(i.total_price)}</td><td><span class="badge ${badge}">${i.status}</span></td><td>${i.checkin_date}</td><td>${(i.created_at||'').slice(0,10)}</td></tr>`;
    }).join('');
    html += d.length===0?'<tr><td colspan="7" class="loading-row">暂无对账数据</td></tr>':'';
    html += '</tbody></table></div>';
    document.getElementById('reconTable').innerHTML = html;
  }catch(e){
    document.getElementById('reconTable').innerHTML = '<div class="loading" style="color:var(--error);">加载失败: '+e.message+'</div>';
    toast('对账加载失败: '+e.message, 'error');
  }
}

function exportCSV(type){
  let tbl = document.getElementById(type==='daily'?'dailyTable':'reconTable');
  let csv = []; tbl.querySelectorAll('tr').forEach(r=>{
    csv.push([].map.call(r.cells,c=>'"'+c.textContent.replace(/"/g,'""')+'"').join(','));
  });
  let b = new Blob(['\uFEFF'+csv.join('\n')],{type:'text/csv'});
  let a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download='finance_'+type+'_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
}

loadDaily(); loadMonthly(); loadRecon();
</script>
</body>
</html>
