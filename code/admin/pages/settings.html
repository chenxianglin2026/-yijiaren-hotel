<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div class="page">
  <div class="page-title">系统设置</div>

  <div class="settings-layout">
    <!-- Settings Nav -->
    <nav class="settings-nav">
      <div class="sn-item active" onclick="switchSetting(this, 'basic')">企业管理</div>
      <div class="sn-item" onclick="switchSetting(this, 'account')">账号管理</div>
      <div class="sn-item" onclick="switchSetting(this, 'pricing')">价格策略</div>
      <div class="sn-item" onclick="switchSetting(this, 'notification')">通知设置</div>
      <div class="sn-item" onclick="switchSetting(this, 'backup')">数据备份</div>
      <div class="sn-item" onclick="switchSetting(this, 'logs')">操作日志</div>
    </nav>

    <!-- 企业管理 (Basic Info → /api/auth/me) -->
    <div class="settings-panel show" id="panel-basic">
      <div class="settings-section">
        <h3>企业信息</h3>
        <div id="enterprise-loading" style="color:#999;padding:20px;">加载中...</div>
        <div id="enterprise-content" style="display:none;">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">用户名</label>
              <input class="form-input" id="ent-username" readonly>
            </div>
            <div class="form-group">
              <label class="form-label">昵称</label>
              <input class="form-input" id="ent-nickname" readonly>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">角色</label>
              <input class="form-input" id="ent-role" readonly>
            </div>
            <div class="form-group">
              <label class="form-label">手机号</label>
              <input class="form-input" id="ent-phone" readonly>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">用户ID</label>
              <input class="form-input" id="ent-id" readonly>
            </div>
            <div class="form-group">
              <label class="form-label">账号状态</label>
              <input class="form-input" id="ent-active" readonly>
            </div>
          </div>
        </div>
        <div id="enterprise-error" style="display:none;color:#e74c3c;padding:20px;"></div>
      </div>

      <div class="settings-section">
        <h3>系统参数</h3>
        <p style="color:#999;padding:20px;">TODO: 系统参数配置功能待开发</p>
      </div>
    </div>

    <!-- 账号管理 -->
    <div class="settings-panel" id="panel-account">
      <div class="settings-section">
        <h3>管理员账号列表</h3>
        <div id="account-loading" style="color:#999;padding:20px;">加载中...</div>
        <div id="account-error" style="display:none;color:#e74c3c;padding:20px;"></div>
        <div id="account-content" style="display:none;">
          <div class="settings-toolbar" style="margin-bottom:12px;display:flex;gap:8px;align-items:center;">
            <input class="form-input" id="account-search" placeholder="搜索用户名/手机号..." style="width:240px;" oninput="filterAccounts()">
            <span style="font-size:12px;color:var(--text-muted);">共 <b id="account-total">0</b> 个账号</span>
          </div>
          <div style="overflow-x:auto;">
            <table class="data-table" id="account-table" style="width:100%;">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>用户名</th>
                  <th>昵称</th>
                  <th>手机号</th>
                  <th>角色</th>
                  <th>状态</th>
                  <th>创建时间</th>
                </tr>
              </thead>
              <tbody id="account-tbody">
              </tbody>
            </table>
          </div>
          <div id="account-empty" style="display:none;text-align:center;color:var(--text-muted);padding:40px;">
            暂无账号数据
          </div>
        </div>
      </div>
    </div>

    <!-- 价格策略 (TODO) -->
    <div class="settings-panel" id="panel-pricing">
      <div class="settings-section">
        <h3>价格策略</h3>
        <p style="color:#c8a052;font-size:18px;text-align:center;padding:60px 0;">🚧 TODO<br><span style="font-size:14px;color:#999;">价格策略功能待开发</span></p>
      </div>
    </div>

    <!-- 通知设置 (TODO) -->
    <div class="settings-panel" id="panel-notification">
      <div class="settings-section">
        <h3>通知设置</h3>
        <p style="color:#c8a052;font-size:18px;text-align:center;padding:60px 0;">🚧 TODO<br><span style="font-size:14px;color:#999;">通知设置功能待开发</span></p>
      </div>
    </div>

    <!-- 数据备份 (TODO) -->
    <div class="settings-panel" id="panel-backup">
      <div class="settings-section">
        <h3>数据备份</h3>
        <p style="color:#c8a052;font-size:18px;text-align:center;padding:60px 0;">🚧 TODO<br><span style="font-size:14px;color:#999;">数据备份功能待开发</span></p>
      </div>
    </div>

    <!-- 操作日志 (TODO) -->
    <div class="settings-panel" id="panel-logs">
      <div class="settings-section">
        <h3>操作日志</h3>
        <p style="color:#c8a052;font-size:18px;text-align:center;padding:60px 0;">🚧 TODO<br><span style="font-size:14px;color:#999;">操作日志功能待开发</span></p>
      </div>
    </div>
  </div>
</div>

<script>
function switchSetting(el, panelId) {
  document.querySelectorAll('.sn-item').forEach(function(i) { i.classList.remove('active'); });
  el.classList.add('active');
  document.querySelectorAll('.settings-panel').forEach(function(p) { p.classList.remove('show'); });
  document.getElementById('panel-' + panelId).classList.add('show');
}

// 加载企业信息（当前登录用户）
(function loadEnterpriseInfo() {
  var token = localStorage.getItem('yjr_token');
  if (!token) { return; }

  fetch('/api/auth/me', {
    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(function(res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  })
  .then(function(user) {
    document.getElementById('enterprise-loading').style.display = 'none';
    document.getElementById('enterprise-content').style.display = 'block';
    document.getElementById('ent-username').value = user.username || '--';
    document.getElementById('ent-nickname').value = user.nickname || '--';
    document.getElementById('ent-role').value = user.role || '--';
    document.getElementById('ent-phone').value = user.phone || '--';
    document.getElementById('ent-id').value = user.id || '--';
    document.getElementById('ent-active').value = user.is_active ? '正常' : '已禁用';
  })
  .catch(function(err) {
    document.getElementById('enterprise-loading').style.display = 'none';
    document.getElementById('enterprise-error').style.display = 'block';
    document.getElementById('enterprise-error').textContent = '加载失败: ' + err.message;
  });
})();

// 账号管理 - 加载用户列表
var allAccounts = [];
(function loadAccounts() {
  var token = localStorage.getItem('yjr_token');
  if (!token) { return; }

  fetch('/api/auth/users', {
    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(function(res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  })
  .then(function(result) {
    allAccounts = result.data || [];
    document.getElementById('account-loading').style.display = 'none';
    document.getElementById('account-content').style.display = 'block';
    renderAccounts(allAccounts);
  })
  .catch(function(err) {
    document.getElementById('account-loading').style.display = 'none';
    document.getElementById('account-error').style.display = 'block';
    document.getElementById('account-error').textContent = '加载失败: ' + err.message + ' (需管理员权限)';
  });
})();

function renderAccounts(list) {
  var tbody = document.getElementById('account-tbody');
  var total = document.getElementById('account-total');
  var empty = document.getElementById('account-empty');
  var table = document.getElementById('account-table');

  total.textContent = list.length;

  if (list.length === 0) {
    empty.style.display = 'block';
    table.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  table.style.display = '';
  tbody.innerHTML = list.map(function(u) {
    var roleLabel = { admin: '管理员', front_desk: '前台', cleaner: '保洁员', guest: '住客' }[u.role] || u.role;
    var roleStyle = u.role === 'admin' ? 'color:#c8a052;font-weight:700;' : '';
    var statusHtml = u.is_active
      ? '<span style=\"color:#6BAA75;\">● 正常</span>'
      : '<span style=\"color:#e74c3c;\">● 已禁用</span>';
    var timeStr = u.created_at ? u.created_at.slice(0, 10) : '--';
    return '<tr>' +
      '<td>' + u.id + '</td>' +
      '<td>' + (u.username || '--') + '</td>' +
      '<td>' + (u.nickname || '--') + '</td>' +
      '<td>' + (u.phone || '--') + '</td>' +
      '<td><span style=\"' + roleStyle + '\">' + roleLabel + '</span></td>' +
      '<td>' + statusHtml + '</td>' +
      '<td>' + timeStr + '</td>' +
      '</tr>';
  }).join('');
}

function filterAccounts() {
  var q = document.getElementById('account-search').value.toLowerCase();
  var filtered = allAccounts.filter(function(u) {
    return (u.username || '').toLowerCase().indexOf(q) !== -1
      || (u.phone || '').indexOf(q) !== -1
      || (u.nickname || '').toLowerCase().indexOf(q) !== -1;
  });
  renderAccounts(filtered);
}
</script>
</body>
</html>
