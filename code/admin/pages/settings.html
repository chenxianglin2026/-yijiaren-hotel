<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div class="page">
  <div class="page-title">系统设置</div>

  <div class="settings-layout">
    <!-- Settings Nav -->
    <nav class="settings-nav">
      <div class="sn-item active" onclick="switchSetting(this, 'basic')">企业管理</div>
      <div class="sn-item" onclick="switchSetting(this, 'account')">账号管理</div>
      <div class="sn-item" onclick="switchSetting(this, 'pricing')">价格策略</div>
      <div class="sn-item" onclick="switchSetting(this, 'notification')">通知设置</div>
      <div class="sn-item" onclick="switchSetting(this, 'backup')">数据备份</div>
      <div class="sn-item" onclick="switchSetting(this, 'logs')">操作日志</div>
    </nav>

    <!-- 企业管理 (Basic Info → /api/auth/me) -->
    <div class="settings-panel show" id="panel-basic">
      <div class="settings-section">
        <h3>企业信息</h3>
        <div id="enterprise-loading" style="color:#999;padding:20px;">加载中...</div>
        <div id="enterprise-content" style="display:none;">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">用户名</label>
              <input class="form-input" id="ent-username" readonly>
            </div>
            <div class="form-group">
              <label class="form-label">昵称</label>
              <input class="form-input" id="ent-nickname" readonly>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">角色</label>
              <input class="form-input" id="ent-role" readonly>
            </div>
            <div class="form-group">
              <label class="form-label">手机号</label>
              <input class="form-input" id="ent-phone" readonly>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">用户ID</label>
              <input class="form-input" id="ent-id" readonly>
            </div>
            <div class="form-group">
              <label class="form-label">账号状态</label>
              <input class="form-input" id="ent-active" readonly>
            </div>
          </div>
        </div>
        <div id="enterprise-error" style="display:none;color:#e74c3c;padding:20px;"></div>
      </div>

      <div class="settings-section">
        <h3>系统参数</h3>
        <p style="color:#999;padding:20px;">TODO: 系统参数配置功能待开发</p>
      </div>
    </div>

    <!-- 账号管理 (TODO) -->
    <div class="settings-panel" id="panel-account">
      <div class="settings-section">
        <h3>管理员账号</h3>
        <p style="color:#c8a052;font-size:18px;text-align:center;padding:60px 0;">🚧 TODO<br><span style="font-size:14px;color:#999;">账号管理功能待开发</span></p>
      </div>
    </div>

    <!-- 价格策略 (TODO) -->
    <div class="settings-panel" id="panel-pricing">
      <div class="settings-section">
        <h3>价格策略</h3>
        <p style="color:#c8a052;font-size:18px;text-align:center;padding:60px 0;">🚧 TODO<br><span style="font-size:14px;color:#999;">价格策略功能待开发</span></p>
      </div>
    </div>

    <!-- 通知设置 (TODO) -->
    <div class="settings-panel" id="panel-notification">
      <div class="settings-section">
        <h3>通知设置</h3>
        <p style="color:#c8a052;font-size:18px;text-align:center;padding:60px 0;">🚧 TODO<br><span style="font-size:14px;color:#999;">通知设置功能待开发</span></p>
      </div>
    </div>

    <!-- 数据备份 (TODO) -->
    <div class="settings-panel" id="panel-backup">
      <div class="settings-section">
        <h3>数据备份</h3>
        <p style="color:#c8a052;font-size:18px;text-align:center;padding:60px 0;">🚧 TODO<br><span style="font-size:14px;color:#999;">数据备份功能待开发</span></p>
      </div>
    </div>

    <!-- 操作日志 (TODO) -->
    <div class="settings-panel" id="panel-logs">
      <div class="settings-section">
        <h3>操作日志</h3>
        <p style="color:#c8a052;font-size:18px;text-align:center;padding:60px 0;">🚧 TODO<br><span style="font-size:14px;color:#999;">操作日志功能待开发</span></p>
      </div>
    </div>
  </div>
</div>

<script>
function switchSetting(el, panelId) {
  document.querySelectorAll('.sn-item').forEach(function(i) { i.classList.remove('active'); });
  el.classList.add('active');
  document.querySelectorAll('.settings-panel').forEach(function(p) { p.classList.remove('show'); });
  document.getElementById('panel-' + panelId).classList.add('show');
}

// 加载企业信息（当前登录用户）
(function loadEnterpriseInfo() {
  var token = localStorage.getItem('yjr_token');
  if (!token) { return; }

  fetch('/api/auth/me', {
    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(function(res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  })
  .then(function(user) {
    document.getElementById('enterprise-loading').style.display = 'none';
    document.getElementById('enterprise-content').style.display = 'block';
    document.getElementById('ent-username').value = user.username || '--';
    document.getElementById('ent-nickname').value = user.nickname || '--';
    document.getElementById('ent-role').value = user.role || '--';
    document.getElementById('ent-phone').value = user.phone || '--';
    document.getElementById('ent-id').value = user.id || '--';
    document.getElementById('ent-active').value = user.is_active ? '正常' : '已禁用';
  })
  .catch(function(err) {
    document.getElementById('enterprise-loading').style.display = 'none';
    document.getElementById('enterprise-error').style.display = 'block';
    document.getElementById('enterprise-error').textContent = '加载失败: ' + err.message;
  });
})();
</script>
</body>
</html>
