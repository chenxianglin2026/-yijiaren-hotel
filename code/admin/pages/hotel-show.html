<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>酒店展示 · 维也纳标准</title>
<style>
:root{--gold:#C5A46B;--gold-dark:#B8933B;--gold-light:#E8D5A3;--gold-bg:rgba(197,164,107,.08);--bg:#F5F5F7;--bg-card:#FFFFFF;--text:#1A1A1A;--text-dim:#888888;--text-mid:#555555;--red:#E8553D;--tag-bg:rgba(197,164,107,.12);--tag-border:rgba(197,164,107,.25);--radius:12px;--shadow:0 2px 12px rgba(0,0,0,.06);--border:1px solid rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* Hero */
.hero{height:320px;position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:24px 20px}
.hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.1) 0%,rgba(0,0,0,.25) 50%,rgba(0,0,0,.7) 100%)}
.hero-content{position:relative;z-index:1}
.hero-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 10px;border:1px solid var(--gold-light);color:var(--gold-light);border-radius:4px;margin-bottom:8px;letter-spacing:2px}
.hero-title{font-size:28px;font-weight:800;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.4)}
.hero-sub{font-size:13px;color:rgba(255,255,255,.8);margin-top:4px;line-height:1.5;max-width:500px}
.hero-stats{display:flex;gap:20px;margin-top:12px}
.hero-stat{text-align:center}
.hero-stat .n{font-size:20px;font-weight:700;color:var(--gold-light)}
.hero-stat .l{font-size:10px;color:rgba(255,255,255,.7)}
/* Video Banner */
.video-banner{margin:16px 16px 0;border-radius:var(--radius);overflow:hidden;position:relative;background:#1a1a1a;cursor:pointer;box-shadow:var(--shadow)}
.video-banner img{width:100%;height:180px;object-fit:cover;display:block;opacity:.65;transition:opacity .3s}
.video-banner:hover img{opacity:.85}
.video-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:1}
.video-play-btn{width:56px;height:56px;border-radius:50%;background:rgba(197,164,107,.9);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;transition:transform .2s,background .2s}
.video-banner:hover .video-play-btn{transform:scale(1.1);background:var(--gold)}
.video-label{font-size:13px;color:rgba(255,255,255,.9);font-weight:600;letter-spacing:1px}
.video-sub{font-size:11px;color:rgba(255,255,255,.6)}
/* Content */
.content{padding:0 16px;margin-top:16px;position:relative;z-index:2}
/* Info Cards */
.info-card{background:var(--bg-card);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:var(--border);box-shadow:var(--shadow)}
.info-card .card-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.info-card .card-desc{font-size:13px;color:var(--text-mid);line-height:1.7}
/* Features Grid */
.features-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.feat-item{display:flex;align-items:center;gap:6px;padding:8px 10px;background:#f8f8f8;border-radius:6px;font-size:12px;color:var(--text-mid)}
.feat-item .fi{font-size:16px}
/* Facilities */
.facility-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.fac-tag{font-size:11px;padding:4px 10px;background:#f8f8f8;border-radius:6px;color:var(--text-mid);border:1px solid #eee;display:flex;align-items:center;gap:4px}
.fac-tag.core{border-color:rgba(170,192,128,.2);color:#5A8A3C;background:rgba(170,192,128,.08)}
.fac-section{margin-bottom:10px}
.fac-section-label{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;font-weight:600}
/* Time Info */
.time-row{display:flex;gap:20px}
.time-item{flex:1;text-align:center;padding:12px;background:#f8f8f8;border-radius:8px}
.time-item .tv{font-size:18px;font-weight:700;color:var(--gold-dark)}
.time-item .tl{font-size:10px;color:var(--text-dim);margin-top:2px}
/* CTA */
.cta-section{padding:20px 16px 30px}
.btn-rooms{display:block;width:100%;padding:14px;background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;transition:opacity .2s,transform .2s;box-shadow:0 2px 8px rgba(197,164,107,.3)}
.btn-rooms:hover{opacity:.9;transform:translateY(-1px)}
/* Reviews */
.review-mini{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
.review-chip{flex:none;width:200px;background:#f8f8f8;border-radius:8px;padding:12px;border:1px solid #eee}
.review-chip .rc-stars{color:var(--gold);font-size:12px}
.review-chip .rc-text{font-size:12px;color:var(--text-mid);line-height:1.5;margin-top:4px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.review-chip .rc-user{font-size:10px;color:var(--text-dim);margin-top:4px}
/* Loading */
.loading{padding:40px;text-align:center;color:var(--text-dim)}
/* Responsive */
@media(min-width:768px){
  .hero{height:380px;padding:32px 40px}
  .hero-title{font-size:34px}
  .content{max-width:800px;margin:0 auto;padding:0 24px;margin-top:20px}
  .video-banner{max-width:800px;margin:16px auto 0}
  .video-banner img{height:220px}
  .features-grid{grid-template-columns:repeat(3,1fr)}
  .cta-section{max-width:800px;margin:0 auto}
}
</style>
</head>
<body>
<div class="hero">
  <img class="hero-img" src="https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?w=1200&q=80" alt="酒店外观" loading="lazy">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-badge">VIENNA STANDARD</div>
    <div class="hero-title" id="heroTitle">加载中...</div>
    <div class="hero-sub" id="heroDesc"></div>
    <div class="hero-stats" id="heroStats"></div>
  </div>
</div>

<div class="video-banner" onclick="openVideo()">
  <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?w=1200&q=80" alt="酒店视频" loading="lazy">
  <div class="video-overlay">
    <div class="video-play-btn">▶</div>
    <div class="video-label">酒店巡礼</div>
    <div class="video-sub">点击观看酒店实景视频</div>
  </div>
</div>

<div class="content">
  <div class="info-card" id="featuresCard">
    <div class="card-title">✨ 酒店特色</div>
    <div class="features-grid" id="featuresGrid"></div>
  </div>

  <div class="info-card" id="facilitiesCard">
    <div class="card-title">🏨 酒店设施</div>
    <div id="facilitiesContent"></div>
  </div>

  <div class="info-card">
    <div class="card-title">🕐 入离时间</div>
    <div class="time-row">
      <div class="time-item">
        <div class="tv" id="checkinTime">—</div>
        <div class="tl">入住时间</div>
      </div>
      <div class="time-item">
        <div class="tv" id="checkoutTime">—</div>
        <div class="tl">退房时间</div>
      </div>
  </div>

  <div class="info-card" id="reviewsCard">
    <div class="card-title">⭐ 住客点评</div>
    <div class="review-mini" id="reviewMini"></div>
  </div>
</div>

<div class="cta-section">
  <a href="room-show.html" class="btn-rooms">🛏️ 查看全部房型 & 预订</a>
</div>

<script>
var PROJ = (function(){
  var h=location.hostname||'';
  if(h.indexOf('yijia888')>=0||location.port==='8001'||location.pathname.indexOf('yijiaren')>=0) return 'yijiaren';
  if(h.indexOf('yijia888vip')>=0||location.port==='8000'||location.pathname.indexOf('apartment')>=0) return 'apartment';
  if(h.indexOf('xyz')>=0||location.port==='8002'||location.pathname.indexOf('scenic')>=0) return 'scenic';
  return 'yijiaren';
})();

var API = '/api/content';

function openVideo(){
  alert('酒店实景视频即将上线！\n敬请期待维也纳标准酒店巡礼。');
}

var FAC_ICONS = {
  '免费WiFi':'📶','千兆WiFi':'📶','中央空调':'❄️','24小时热水':'🚿','55寸智能电视':'📺',
  '智能马桶':'🚽','独立浴缸':'🛁','迷你吧':'🍸','电动窗帘':'🪟','Bose蓝牙音响':'🔊',
  '健身房':'🏋️','商务会议室':'💼','行李寄存':'🧳','叫醒服务':'⏰','洗衣房':'👕',
  '停车场':'🅿️','免费停车场':'🅿️','地下停车场':'🅿️',
  '餐厅':'🍽️','自助早餐':'🍳','行政早餐':'🍽️',
  '户外无边泳池':'🏊','茶室':'🍵','棋牌室':'🀄','儿童游乐区':'🎠','观景露台':'🏖️',
  '景区穿梭巴士':'🚌','穿梭巴士':'🚌','接送机':'✈️',
  '人脸识别门禁':'👤','智能快递柜':'📦','公共洗衣房':'👕',
  '共享厨房':'🍳','一楼便利店':'🏪','24小时管家服务':'🤵',
  '充电桩':'🔌','免费打印':'🖨️'
};

function facIcon(name){
  for(var k in FAC_ICONS){if(name.indexOf(k)>=0||k.indexOf(name)>=0) return FAC_ICONS[k];}
  return '✨';
}

function starStr(n){var s='';for(var i=1;i<=5;i++)s+=i<=n?'★':'☆';return s;}

var hotelEp=PROJ==='apartment'?'/properties':'/hotels';

fetch(API+hotelEp).then(function(r){return r.json();}).then(function(data){
  var hotels=data;
  if(!hotels||!hotels.length){document.getElementById('heroTitle').textContent='暂无数据';return;}
  var h=hotels[0];
  
  document.getElementById('heroTitle').textContent=h.name;
  document.getElementById('heroDesc').textContent=h.desc||'';
  document.getElementById('checkinTime').textContent=h.checkin_time||'14:00';
  document.getElementById('checkoutTime').textContent=h.checkout_time||'12:00';
  
  // Stats
  document.getElementById('heroStats').innerHTML=
    '<div class=hero-stat><div class=n>'+(h.features?h.features.length:0)+'</div><div class=l>特色服务</div></div>'+
    '<div class=hero-stat><div class=n>'+(h.facilities?(typeof h.facilities==='object'?Object.values(h.facilities).flat().length:h.facilities.length):0)+'</div><div class=l>配套设施</div></div>';
  
  // Features
  var featHtml='';
  (h.features||[]).forEach(function(f){featHtml+='<div class=feat-item><span class=fi>✦</span>'+f+'</div>';});
  document.getElementById('featuresGrid').innerHTML=featHtml;
  
  // Facilities
  var fac=h.facilities;
  var facHtml='';
  if(fac&&typeof fac==='object'&&!Array.isArray(fac)){
    if(fac.core&&fac.core.length) facHtml+='<div class=fac-section><div class=fac-section-label>🏠 核心设施</div><div class=facility-row>'+fac.core.map(function(f){return '<span class=\"fac-tag core\">'+facIcon(f)+' '+f+'</span>';}).join('')+'</div></div>';
    if(fac.upgrade&&fac.upgrade.length) facHtml+='<div class=fac-section><div class=fac-section-label>⭐ 升级设施</div><div class=facility-row>'+fac.upgrade.map(function(f){return '<span class=fac-tag\">'+facIcon(f)+' '+f+'</span>';}).join('')+'</div></div>';
    if(fac.service&&fac.service.length) facHtml+='<div class=fac-section><div class=fac-section-label>🎁 酒店服务</div><div class=facility-row>'+fac.service.map(function(f){return '<span class=fac-tag\">'+facIcon(f)+' '+f+'</span>';}).join('')+'</div></div>';
  }else if(Array.isArray(fac)){
    facHtml='<div class=facility-row>'+fac.map(function(f){return '<span class=\"fac-tag core\">'+facIcon(f)+' '+f+'</span>';}).join('')+'</div>';
  }
  document.getElementById('facilitiesContent').innerHTML=facHtml||'<div class=loading>暂无数据</div>';
}).catch(function(e){
  document.getElementById('heroTitle').textContent='加载失败';
  console.error(e);
});

// Reviews
fetch(API+'/reviews-show').then(function(r){return r.json();}).then(function(reviews){
  if(!reviews||!reviews.length) return;
  document.getElementById('reviewMini').innerHTML=reviews.slice(0,5).map(function(r){
    return '<div class=review-chip><div class=rc-stars>'+starStr(r.rating)+'</div><div class=rc-text>'+r.content+'</div><div class=rc-user>— '+r.user_name+' · '+r.date+'</div></div>';
  }).join('');
}).catch(function(){});
</script>
</body>
</html>
