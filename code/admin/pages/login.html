<!DOCTYPE html><html lang=zh-CN><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>登录 - 伊家人酒店</title>
<style>*{margin:0;padding:0}body{font:14px sans-serif;background:linear-gradient(135deg,#1a2035,#2d3a5c);min-height:100vh;display:flex;align-items:center;justify-content:center}.box{background:#fff;border-radius:12px;padding:36px;width:340px;box-shadow:0 8px 40px rgba(0,0,0,.3);text-align:center}h2{margin-bottom:24px;color:#333}input{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px;font-size:14px;box-sizing:border-box}button{width:100%;padding:12px;margin-top:12px;background:#2b5aed;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer}.err{color:#e74c3c;font-size:12px;margin-top:8px}.ft{position:fixed;bottom:10px;left:0;right:0;text-align:center;font-size:11px;opacity:.5}.ft a{color:#fff;text-decoration:none}</style></head><body>
<div class=box><h2>🏨 伊家人酒店</h2><input id=u placeholder=用户名 autofocus><input id=p type=password placeholder=密码><button onclick=L()>登 录</button><div class=err id=e></div></div>
<div class=ft><a href=https://beian.miit.gov.cn>粤ICP备16027093号-2</a></div>
<script>async function L(){var u=document.getElementById('u').value.trim();var p=document.getElementById('p').value;if(!u||!p)return;try{var r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});var d=await r.json();var t=d.access_token||(d.data&&d.data.access_token);if(t){localStorage.setItem('yjr_token',t);localStorage.setItem('yijiaren_token',t);localStorage.setItem('yjr_user',u);location.href='../'}else{document.getElementById('e').textContent=d.detail||'登录失败'}}catch(x){document.getElementById('e').textContent='网络错误'}}</script></body></html>
