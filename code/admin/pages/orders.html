<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>订单管理</title>
<link rel="stylesheet" href="../css/admin.css">
<style>
.page{padding:16px}.title{font-size:18px;font-weight:700;margin-bottom:16px}
.stats{display:flex;gap:12px;margin-bottom:16px}
.stat{padding:14px 20px;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);flex:1;text-align:center}
.stat-val{font-size:24px;font-weight:700}.stat-lbl{font-size:12px;color:#999;margin-top:4px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
th{background:#fafafa;padding:12px;text-align:left;font-size:12px;color:#666;font-weight:600}
td{padding:10px 12px;border-bottom:1px solid #f0f0f0;font-size:13px}
tr:hover{background:#fafafa}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-pending{background:#fff7e6;color:#d48806}
.badge-paid{background:#f6ffed;color:#389e0d}
.badge-checked{background:#e6f7ff;color:#096dd9}
.badge-done{background:#f0f0f0;color:#666}
.empty{text-align:center;padding:60px;color:#999}
</style>
</head>
<body><div class="page">
<div class="title">📋 订单管理</div>
<div class="stats" id="stats"></div>
<div id="table"><div class="empty">加载中...</div></div>
</div>
<script>
var BADGE={pending:'badge-pending',paid:'badge-paid',checked_in:'badge-checked',completed:'badge-done'};
var LABEL={pending:'待支付',paid:'已支付',checked_in:'已入住',completed:'已完成'};

fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},
  body:JSON.stringify({username:'admin',password:'admin123'})})
.then(function(r){return r.json()})
.then(function(j){
  var tok=j.access_token;
  return fetch('/api/orders?page_size=100',{headers:{'Authorization':'Bearer '+tok}});
})
.then(function(r){return r.json()})
.then(function(j){
  var items=j.items||[];
  if(!items.length){document.getElementById('table').innerHTML='<div class=empty>暂无订单</div>';return}
  var st=items.reduce(function(a,i){a.total++;if(i.status==='pending')a.pending++;if(i.status==='paid'||i.status==='checked_in')a.active++;return a},{total:0,pending:0,active:0});
  document.getElementById('stats').innerHTML='<div class=stat><div class=stat-val>'+st.total+'</div><div class=stat-lbl>总订单</div></div><div class=stat><div class=stat-val style=color:#d48806>'+st.pending+'</div><div class=stat-lbl>待支付</div></div><div class=stat><div class=stat-val style=color:#096dd9>'+st.active+'</div><div class=stat-lbl>进行中</div></div>';
  var h='<table><tr><th>订单号</th><th>客人</th><th>酒店</th><th>入住</th><th>离店</th><th>金额</th><th>状态</th></tr>';
  items.forEach(function(o){
    h+='<tr><td>'+(o.order_no||'#')+'</td><td>'+o.guest_name+'</td><td>'+o.hotel_name+'</td><td>'+o.checkin_date+'</td><td>'+o.checkout_date+'</td><td>¥'+(o.total_price||0)+'</td><td><span class=badge '+(BADGE[o.status]||'')+'>'+(LABEL[o.status]||o.status)+'</span></td></tr>';
  });
  h+='</table>';
  document.getElementById('table').innerHTML=h;
})
.catch(function(e){document.getElementById('table').innerHTML='<div class=empty>加载失败: '+e.message+'</div>'});
</script>
</body></html>
