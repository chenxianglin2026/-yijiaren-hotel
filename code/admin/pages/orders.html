<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../css/admin.css">
<style>
.detail-row { display:flex; padding:10px 0; border-bottom:1px solid var(--border); }
.detail-label { width:90px; font-size:13px; color:var(--text-muted); flex-shrink:0; }
.detail-value { font-size:14px; color:var(--text-primary); }
</style>
</head>
<body>
<div class="page">
  <div class="page-title">订单管理</div>

  <div class="stat-cards" id="statCards"></div>

  <div class="card">
    <div class="filter-bar">
      <input class="form-input" id="search" placeholder="🔍 搜索订单号/客人姓名..." style="width:220px;">
      <select class="form-select" id="status"><option value="">全部状态</option><option>pending</option><option>paid</option><option>checked_in</option><option>completed</option><option>cancelled</option></select>
      <input class="form-input" type="date" id="dateFrom" style="width:140px;">
      <span style="color:var(--text-muted);">至</span>
      <input class="form-input" type="date" id="dateTo" style="width:140px;">
      <button class="btn btn-primary btn-sm" onclick="loadOrders()">查询</button>
      <button class="btn btn-outline btn-sm" onclick="resetFilters()">重置</button>
      <button class="btn btn-outline btn-sm" style="margin-left:auto;" onclick="exportCSV()">📥 导出</button>
    </div>
  </div>

  <div class="card">
    <div class="table-wrap">
      <table><thead><tr>
        <th>订单号</th><th>客人</th><th>房型</th><th>入住/退房</th><th class="text-right">金额</th><th>状态</th><th>创建时间</th><th>操作</th>
      </tr></thead><tbody id="ordersBody"><tr><td colspan="8" class="loading-row">加载中...</td></tr></tbody></table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

  <div class="modal-overlay" id="detailModal">
    <div class="modal">
      <div class="modal-header"><div class="modal-title">订单详情</div><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="modal-body" id="detailContent"></div>
    </div>
  </div>
</div>

<script>
const T = localStorage.getItem('yjr_token');
const H = { 'Authorization':'Bearer '+T };
const F = n => '¥'+Number(n||0).toLocaleString();
const STATUS = {pending:'待支付',paid:'已支付',checked_in:'已入住',completed:'已完成',cancelled:'已取消'};
const BADGE = {pending:'badge-warning',paid:'badge-info',checked_in:'badge-success',completed:'badge-processing',cancelled:'badge-error'};

let page=1, pageSize=10, totalCount=0;

async function loadOrders(){
  let params = new URLSearchParams();
  let s = document.getElementById('search').value.trim();
  if(s) params.set('keyword',s);
  let st = document.getElementById('status').value;
  if(st) params.set('status',st);
  let df = document.getElementById('dateFrom').value;
  if(df) params.set('start_date',df);
  let dt = document.getElementById('dateTo').value;
  if(dt) params.set('end_date',dt);
  params.set('page',page); params.set('page_size',pageSize);

  try{
    let r = await fetch('/api/orders?'+params,{headers:H});
    if (r.status === 401) { window.top.location.href = 'pages/login.html'; return; }
    let j = await r.json();
    if(j.code!==0) throw new Error(j.msg);
    let items = j.data?.items || j.data || [];
    totalCount = j.data?.total || items.length;

    // Stat cards
    let stats = {total:totalCount, paid:0, pending:0};
    items.forEach(i=>{ stats.paid+=i.status==='paid'||i.status==='checked_in'?1:0; stats.pending+=i.status==='pending'?1:0; });
    document.getElementById('statCards').innerHTML = [
      {icon:'📋',cls:'gold',val:totalCount,label:'查询结果'},
      {icon:'✅',cls:'green',val:stats.paid,label:'已支付/入住'},
      {icon:'💰',cls:'blue',val:F(items.reduce((s,i)=>s+(i.total_price||0),0)),label:'金额合计'},
      {icon:'🕐',cls:'red',val:stats.pending,label:'待支付'}
    ].map(s=>`<div class="stat-card"><div class="stat-icon ${s.cls}">${s.icon}</div><div class="stat-info"><div class="stat-value">${s.val}</div><div class="stat-label">${s.label}</div></div></div>`).join('');

    // Table
    document.getElementById('ordersBody').innerHTML = items.length ? items.map(o=>{
      let d = new Date(o.created_at||o.checkin_date||''), ds = d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');
      return `<tr>
        <td><a href="javascript:void(0)" onclick="showDetail('${o.order_no||o.id}')" style="color:var(--gold-dark);font-weight:600;">${o.order_no||o.id}</a></td>
        <td>${o.guest_name||'-'}</td>
        <td>${o.room_type||'-'}</td>
        <td>${o.checkin_date||'-'} ~ ${o.checkout_date||'-'}</td>
        <td class="text-right" style="font-weight:600;">${F(o.total_price)}</td>
        <td><span class="badge ${BADGE[o.status]||'badge-info'}">${STATUS[o.status]||o.status}</span></td>
        <td>${ds}</td>
        <td><button class="btn btn-outline btn-sm" onclick="showDetail('${o.order_no||o.id}')">详情</button></td>
      </tr>`;
    }).join('') : '<tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:20px;">暂无订单数据</td></tr>';

    // Pagination
    let tp = Math.ceil(totalCount/pageSize);
    let pag = '';
    pag += `<button class="page-btn" ${page<=1?'disabled':''} onclick="goPage(${page-1})">&laquo;</button>`;
    for(let i=Math.max(1,page-2);i<=Math.min(tp,page+2);i++)
      pag += `<button class="page-btn${i===page?' active':''}" onclick="goPage(${i})">${i}</button>`;
    pag += `<button class="page-btn" ${page>=tp?'disabled':''} onclick="goPage(${page+1})">&raquo;</button>`;
    pag += `<span style="font-size:12px;color:var(--text-muted);margin-left:12px;">共${totalCount}条</span>`;
    document.getElementById('pagination').innerHTML = pag;
  }catch(e){
    document.getElementById('ordersBody').innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--error);padding:20px;">加载失败: '+e.message+'</td></tr>';
  }
}

function goPage(p){
  let tp = Math.ceil(totalCount/pageSize);
  if(p<1||p>tp) return;
  page=p; loadOrders();
}

function resetFilters(){
  document.getElementById('search').value='';
  document.getElementById('status').value='';
  document.getElementById('dateFrom').value='';
  document.getElementById('dateTo').value='';
  page=1; loadOrders();
}

async function showDetail(id){
  try{
    let r = await fetch('/api/orders/'+id,{headers:H});
    if (r.status === 401) { window.top.location.href = 'pages/login.html'; return; }
    let j = await r.json();
    let o = (j.code===0?j.data:null)||{};
    document.getElementById('detailContent').innerHTML = 
      '<div class="detail-row"><span class="detail-label">订单编号</span><span class="detail-value">'+(o.order_no||id)+'</span></div>'+
      '<div class="detail-row"><span class="detail-label">客人</span><span class="detail-value">'+(o.guest_name||'-')+' ('+(o.guest_phone||'-')+')</span></div>'+
      '<div class="detail-row"><span class="detail-label">房型</span><span class="detail-value">'+(o.room_type||'-')+'</span></div>'+
      '<div class="detail-row"><span class="detail-label">入住</span><span class="detail-value">'+(o.checkin_date||'-')+'</span></div>'+
      '<div class="detail-row"><span class="detail-label">退房</span><span class="detail-value">'+(o.checkout_date||'-')+'</span></div>'+
      '<div class="detail-row"><span class="detail-label">金额</span><span class="detail-value" style="font-weight:700;color:var(--gold-dark);">'+F(o.total_price)+'</span></div>'+
      '<div class="detail-row"><span class="detail-label">状态</span><span class="detail-value"><span class="badge '+(BADGE[o.status]||'')+'">'+(STATUS[o.status]||o.status||'-')+'</span></span></div>';
    document.getElementById('detailModal').classList.add('show');
  }catch(e){
    alert('加载失败: '+e.message);
  }
}

function closeModal(){ document.getElementById('detailModal').classList.remove('show'); }

function exportCSV(){
  let rows=[['订单号','客人','房型','入住','退房','金额','状态']];
  document.querySelectorAll('#ordersBody tr').forEach(r=>{
    if(r.cells.length<7) return;
    rows.push([].map.call(r.cells,(c,i)=>i<7?c.textContent.trim():'').filter(Boolean));
  });
  let csv = '\uFEFF'+rows.map(r=>r.map(c=>'"'+c.replace(/"/g,'""')+'"').join(',')).join('\n');
  let b = new Blob([csv],{type:'text/csv'});
  let a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download='orders_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
}

loadOrders();
</script>
</body>
</html>
