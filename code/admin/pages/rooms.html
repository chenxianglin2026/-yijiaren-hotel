<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>房态管理</title><link rel="stylesheet" href="../css/admin.css">
<style>.page{padding:16px}.title{font-size:18px;font-weight:700;margin-bottom:16px}
.stats{display:flex;gap:12px;margin-bottom:16px}.stat{padding:14px 20px;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);flex:1;text-align:center}.stat-val{font-size:24px;font-weight:700}.stat-lbl{font-size:12px;color:#999;margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.card{background:#fff;border-radius:8px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);text-align:center;border-top:3px solid #389e0d}
.card-busy{border-top-color:#096dd9}.card-clean{border-top-color:#d48806}
.card-num{font-size:20px;font-weight:700}.card-type{font-size:11px;color:#999;margin:4px 0}.card-price{font-size:13px;color:#666}.card-status{font-size:11px;margin-top:6px;color:#389e0d}
</style></head><body><div class="page"><div class="title">🚪 房态管理</div><div class="stats" id="stats"></div><div class="grid" id="grid"></div></div>
<script>
fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:'admin',password:'admin123'})})
.then(function(r){return r.json()}).then(function(j){
return fetch('/api/rooms/status',{headers:{'Authorization':'Bearer '+j.access_token}})})
.then(function(r){return r.json()}).then(function(j){
document.getElementById('stats').innerHTML='<div class=stat><div class=stat-val>'+(j.total_rooms||0)+'</div><div class=stat-lbl>总房间</div></div><div class=stat><div class=stat-val style=color:#389e0d>'+(j.available_total||0)+'</div><div class=stat-lbl>可订</div></div><div class=stat><div class=stat-val style=color:#096dd9>'+(j.occupied_total||0)+'</div><div class=stat-lbl>已入住</div></div><div class=stat><div class=stat-val style=color:#d48806>'+(j.cleaning_total||0)+'</div><div class=stat-lbl>清洁中</div></div>';
var items=j.items||[];
if(!items.length){document.getElementById('grid').innerHTML='<div style=text-align:center;padding:40px;color:#999;grid-column:1/-1>暂无数据</div>';return}
var h='';
items.forEach(function(r){
var busy=r.occupied_count||r.booked_count||0;
var cls=busy?'card-busy':'';
if(r.cleaning_count)cls='card-clean';
var status=busy?'已入住':'可订';
h+='<div class="card '+cls+'"><div class=card-num>'+r.name+'</div><div class=card-type>'+r.room_type+' · '+r.bed_type+'</div><div class=card-price>¥'+r.price+'</div><div class=card-status>'+status+'</div></div>';
});
document.getElementById('grid').innerHTML=h;
}).catch(function(e){document.getElementById('grid').innerHTML='<div style=text-align:center;padding:40px;color:#cf1322;grid-column:1/-1>加载失败: '+e.message+'</div>'});
</script></body></html>
