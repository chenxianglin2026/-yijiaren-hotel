<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../css/admin.css">
<style>
  .room-toolbar { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
  .room-toolbar .hotel-selector { display:flex; }
  .room-toolbar .hotel-selector .hs-btn { padding:8px 16px; border:1px solid var(--border); background:#fff; cursor:pointer; font-size:13px; transition:var(--transition); }
  .room-toolbar .hotel-selector .hs-btn:first-child { border-radius:6px 0 0 6px; }
  .room-toolbar .hotel-selector .hs-btn:last-child { border-radius:0 6px 6px 0; }
  .room-toolbar .hotel-selector .hs-btn.active { background:var(--gold); color:#fff; border-color:var(--gold); }
  .room-legend { display:flex; gap:16px; align-items:center; font-size:12px; color:var(--text-muted); margin-left:auto; }
  .room-legend span { display:flex; align-items:center; gap:4px; }
  .room-legend .dot { width:10px; height:10px; border-radius:3px; }
  .room-legend .dot.vacant { background:var(--success); }
  .room-legend .dot.occupied { background:var(--info); }
  .room-legend .dot.cleaning { background:var(--warning); }
  .room-legend .dot.maintenance { background:#8c8c8c; }

  .room-floor { margin-bottom:20px; }
  .room-floor-title { font-size:15px; font-weight:600; color:var(--text-primary); margin-bottom:10px; display:flex; align-items:center; gap:8px; }
  .room-floor-title .floor-stat { font-size:12px; font-weight:400; color:var(--text-muted); }
  .room-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:10px; }
  .room-box {
    background:var(--bg-card); border-radius:8px; padding:14px; cursor:pointer;
    border:2px solid transparent; transition:var(--transition); text-align:center;
    position:relative;
  }
  .room-box:hover { transform:translateY(-2px); box-shadow:0 4px 16px rgba(0,0,0,0.08); }
  .room-box.vacant { border-color:#b7eb8f; background:#f6ffed; }
  .room-box.occupied { border-color:#91d5ff; background:#e6f7ff; }
  .room-box.cleaning { border-color:#ffe58f; background:#fffbe6; }
  .room-box.maintenance { border-color:#d9d9d9; background:#f5f5f5; }
  .room-box .room-no { font-size:20px; font-weight:700; }
  .room-box .room-type-name { font-size:11px; color:var(--text-muted); margin-top:2px; }
  .room-box .room-price { font-size:12px; color:var(--gold-dark); font-weight:600; margin-top:4px; }
  .room-box .room-guest-name { font-size:12px; color:var(--text-secondary); margin-top:4px; }
  .room-box .room-timer { font-size:10px; color:var(--text-muted); margin-top:2px; }

  .detail-panel { background:var(--bg-card); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; display:none; }
  .detail-panel.show { display:block; }
  .detail-panel .panel-row { display:flex; margin-bottom:10px; font-size:13px; }
  .detail-panel .panel-label { color:var(--text-muted); width:80px; flex-shrink:0; }
</style>
</head>
<body>
<div class="page">
  <div class="page-title">房态管理</div>

  <!-- Toolbar -->
  <div class="room-toolbar">
    <div class="hotel-selector">
      <button class="hs-btn active" onclick="switchHotel(this, 'jinxiu')">锦绣路旗舰店</button>
      <button class="hs-btn" onclick="switchHotel(this, 'binjiang')">滨江路店</button>
      <button class="hs-btn" onclick="switchHotel(this, 'renmin')">人民路店</button>
    </div>
    <select class="form-select" style="width:auto;">
      <option>全部楼层</option>
      <option>1层</option>
      <option>2层</option>
      <option>3层</option>
      <option>4层</option>
      <option>5层</option>
      <option>6层</option>
    </select>
    <button class="btn btn-outline btn-sm">🔄 刷新</button>
    <div class="room-legend">
      <span><span class="dot vacant"></span>空房</span>
      <span><span class="dot occupied"></span>入住</span>
      <span><span class="dot cleaning"></span>清洁中</span>
      <span><span class="dot maintenance"></span>维修</span>
    </div>
  </div>

  <!-- Room Board -->
  <div id="roomBoard">
    <!-- Rendered by JS -->
  </div>

  <!-- Detail Panel -->
  <div class="detail-panel" id="detailPanel">
    <div class="card-header">
      <div class="card-title" id="detailTitle">房间详情</div>
      <button class="modal-close" onclick="document.getElementById('detailPanel').classList.remove('show')">✕</button>
    </div>
    <div id="detailBody"></div>
  </div>
</div>

var currentHotel = 'jinxiu';

var statusLabels = {
  vacant: '空房',
  occupied: '已入住',
  cleaning: '清洁中',
  maintenance: '维修中'
};

var statusClass = {
  vacant: 'vacant',
  occupied: 'occupied',
  cleaning: 'cleaning',
  maintenance: 'maintenance'
};

function switchHotel(btn, hotel) {
  document.querySelectorAll('.hs-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  currentHotel = hotel;
  document.getElementById('detailPanel').classList.remove('show');
  renderBoard();
}

function renderBoard() {
  var data = hotelData[currentHotel];
  var board = document.getElementById('roomBoard');
  var html = '';
  var totalRooms = 0, occupied = 0, vacant = 0, cleaning = 0, maintenance = 0;

  Object.keys(data.floors).forEach(function(floor) {
    var rooms = data.floors[floor];
    html += '<div class="room-floor">';
    html += '<div class="room-floor-title">' + floor + '</div>';
    html += '<div class="room-grid">';
    rooms.forEach(function(r) {
      totalRooms++;
      if (r.status === 'occupied') occupied++;
      if (r.status === 'vacant') vacant++;
      if (r.status === 'cleaning') cleaning++;
      if (r.status === 'maintenance') maintenance++;

      html += '<div class="room-box ' + statusClass[r.status] + '" onclick="showRoomDetail(\'' + r.no + '\', \'' + r.type + '\', ' + r.price + ', \'' + r.status + '\', \'' + (r.guest || '') + '\', \'' + (r.checkin || '') + '\')">';
      html += '<div class="room-no">' + r.no + '</div>';
      html += '<div class="room-type-name">' + r.type + '</div>';
      html += '<div class="room-price">¥' + r.price + '</div>';
      if (r.guest) {
        html += '<div class="room-guest-name">' + r.guest + '</div>';
      }
      if (r.status === 'occupied' && r.checkin) {
        html += '<div class="room-timer">入住 ' + r.checkin + '</div>';
      }
      html += '</div>';
    });
    html += '</div></div>';
  });

  // Summary
  html += '<div class="card mt-md"><div class="card-title" style="font-size:14px;">📊 ' + data.name + '房态统计</div>';
  html += '<div style="display:flex;gap:24px;margin-top:12px;font-size:13px;">';
  html += '<span>总客房: <strong>' + totalRooms + '</strong>间</span>';
  html += '<span style="color:var(--info);">已入住: <strong>' + occupied + '</strong>间 (' + (totalRooms>0 ? Math.round(occupied/totalRooms*100) : 0) + '%)</span>';
  html += '<span style="color:var(--success);">空房: <strong>' + vacant + '</strong>间</span>';
  html += '<span style="color:var(--warning);">清洁中: <strong>' + cleaning + '</strong>间</span>';
  html += '<span style="color:#8c8c8c;">维修: <strong>' + maintenance + '</strong>间</span>';
  html += '</div></div>';

  board.innerHTML = html;
}

function showRoomDetail(no, type, price, status, guest, checkin) {
  document.getElementById('detailTitle').textContent = no + '号房 · ' + type;
  var body = document.getElementById('detailBody');
  var html = '';
  html += '<div class="detail-row"><span class="detail-label">房号</span><span class="detail-value">' + no + '</span></div>';
  html += '<div class="detail-row"><span class="detail-label">房型</span><span class="detail-value">' + type + '</span></div>';
  html += '<div class="detail-row"><span class="detail-label">价格</span><span class="detail-value" style="color:var(--gold-dark);font-weight:600;">¥' + price + '/晚</span></div>';
  html += '<div class="detail-row"><span class="detail-label">状态</span><span class="detail-value">' + statusLabels[status] + '</span></div>';
  if (guest) {
    html += '<div class="detail-row"><span class="detail-label">客人</span><span class="detail-value">' + guest + '</span></div>';
  }
  if (checkin) {
    html += '<div class="detail-row"><span class="detail-label">入住日期</span><span class="detail-value">2026年' + checkin + '</span></div>';
  }
  html += '<div class="mt-md">';
  html += '<button class="btn btn-primary btn-sm">办理入住</button> ';
  html += '<button class="btn btn-outline btn-sm">设为清洁</button> ';
  html += '<button class="btn btn-outline btn-sm">维修标记</button>';
  html += '</div>';
  body.innerHTML = html;
  document.getElementById('detailPanel').classList.add('show');
}

// Initial

</script>

</html>
