<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../css/admin.css">
<style>
  .room-toolbar { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
  .hs-btn { padding:6px 16px; border:1px solid var(--border); border-radius:6px; background:#fff; cursor:pointer; font-size:13px; }
  .hs-btn.active { background:var(--gold); color:#fff; border-color:var(--gold); }
  .room-legend { display:flex; gap:12px; margin-left:auto; font-size:12px; color:var(--text-muted); }
  .room-legend .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:4px; }
  .dot.vacant{background:var(--success)} .dot.occupied{background:var(--info)} .dot.cleaning{background:var(--warning)} .dot.booked{background:#faad14}
  .room-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
  .room-card-new { background:var(--bg-card); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; border-left:4px solid var(--border); cursor:pointer; transition:var(--transition); position:relative; }
  .room-card-new:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.08); }
  .room-card-new .rc-name { font-size:18px; font-weight:700; color:var(--text-primary); }
  .room-card-new .rc-type { font-size:12px; color:var(--text-muted); margin-top:2px; }
  .room-card-new .rc-stats { display:flex; gap:12px; margin-top:12px; }
  .room-card-new .rc-stat { text-align:center; flex:1; padding:8px 4px; background:#faf8f3; border-radius:6px; }
  .room-card-new .rc-stat .n { font-size:20px; font-weight:700; color:var(--gold-dark); }
  .room-card-new .rc-stat .l { font-size:10px; color:var(--text-muted); }
  .rc-booked{border-left-color:#faad14} .rc-occupied{border-left-color:var(--info)} .rc-vacant{border-left-color:var(--success)} .rc-mixed{border-left-color:var(--gold)}
  /* occupancy progress */
  .rc-progress { margin-top:10px; }
  .rc-progress-header { display:flex; justify-content:space-between; font-size:11px; color:var(--text-muted); margin-bottom:4px; }
  .rc-progress-header .rate { font-weight:700; color:var(--gold-dark); }
  .rc-progress-bar { height:6px; background:#f0f0f0; border-radius:3px; overflow:hidden; }
  .rc-progress-fill { height:100%; border-radius:3px; transition:width .5s ease; }
  .rc-progress-fill.low { background:linear-gradient(90deg, #52c41a, #73d13d); }
  .rc-progress-fill.mid { background:linear-gradient(90deg, #faad14, #ffc53d); }
  .rc-progress-fill.high { background:linear-gradient(90deg, #f5222d, #ff4d4f); }
  .summary-bar { display:flex; gap:16px; margin-bottom:20px; }
  .summary-item-bar { flex:1; text-align:center; padding:12px; background:var(--bg-card); border-radius:var(--radius); box-shadow:var(--shadow); }
  .summary-item-bar .n { font-size:24px; font-weight:700; }
  .summary-item-bar .l { font-size:11px; color:var(--text-muted); }
  /* edit actions on hover */
  .rc-actions { position:absolute; top:8px; right:8px; display:flex; gap:4px; opacity:0; transition:opacity .2s; }
  .room-card-new:hover .rc-actions { opacity:1; }
  .rc-actions button { background:rgba(0,0,0,.5); color:#fff; border:none; border-radius:4px; padding:2px 8px; font-size:11px; cursor:pointer; }
  .rc-actions button:hover { background:var(--gold); color:#000; }
  .rc-actions button.del:hover { background:var(--error); color:#fff; }
  /* responsive */
  @media(max-width:768px){
    .room-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
    .summary-bar{flex-wrap:wrap;gap:8px}
    .summary-item-bar{flex:1 1 calc(50% - 8px);min-width:120px}
    .room-toolbar{gap:8px}
  }
  @media(max-width:480px){
    .room-grid{grid-template-columns:1fr}
    .summary-item-bar{flex:1 1 100%}
    .summary-item-bar .n{font-size:20px}
    .room-toolbar .hs-btn{font-size:11px;padding:4px 10px}
  }
</style>
</head>
<body>
<div class="page">
  <div class="page-title">房态管理</div>

  <div class="room-toolbar">
    <div id="hotelBtns"></div>
    <button class="btn btn-outline btn-sm" onclick="loadRooms()">🔄 刷新</button>
    <button class="btn btn-primary btn-sm" style="margin-left:auto;" onclick="openRoomModal()">+ 新增房型</button>
    <div class="room-legend">
      <span><span class="dot vacant"></span>空闲</span>
      <span><span class="dot booked"></span>已预订</span>
      <span><span class="dot occupied"></span>入住中</span>
      <span><span class="dot cleaning"></span>待清洁</span>
    </div>
  </div>

  <div class="summary-bar" id="summary"></div>
  <div class="room-grid" id="roomGrid"></div>
</div>

<!-- 房型新增/编辑弹窗 -->
<div class="modal-overlay" id="roomModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="roomModalTitle">新增房型</div>
      <button class="modal-close" onclick="closeRoomModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>所属门店 <span style="color:var(--error)">*</span></label>
        <select class="form-select" id="rHotel">
          <option value="">请选择门店</option>
        </select>
      </div>
      <div class="form-row" style="display:flex;gap:12px;">
        <div class="form-group" style="flex:1;">
          <label>房型名称 <span style="color:var(--error)">*</span></label>
          <input class="form-input" id="rName" placeholder="如: 豪华大床房">
        </div>
        <div class="form-group" style="flex:1;">
          <label>房型分类</label>
          <input class="form-input" id="rType" placeholder="如: 大床房/双床房/套房">
        </div>
      </div>
      <div class="form-row" style="display:flex;gap:12px;">
        <div class="form-group" style="flex:1;">
          <label>单价(元/晚) <span style="color:var(--error)">*</span></label>
          <input class="form-input" id="rPrice" type="number" step="0.01" placeholder="如: 299">
        </div>
        <div class="form-group" style="flex:1;">
          <label>总间数</label>
          <input class="form-input" id="rTotal" type="number" value="10" min="1">
        </div>
      </div>
      <div class="form-row" style="display:flex;gap:12px;">
        <div class="form-group" style="flex:1;">
          <label>可用间数</label>
          <input class="form-input" id="rAvail" type="number" value="10" min="0">
        </div>
        <div class="form-group" style="flex:1;">
          <label>面积(m²)</label>
          <input class="form-input" id="rArea" type="number" step="0.1" placeholder="如: 30">
        </div>
      </div>
      <div class="form-row" style="display:flex;gap:12px;">
        <div class="form-group" style="flex:1;">
          <label>床型</label>
          <input class="form-input" id="rBed" placeholder="如: 1.8m大床">
        </div>
        <div class="form-group" style="flex:1;">
          <label>最大入住</label>
          <input class="form-input" id="rGuests" type="number" value="2" min="1">
        </div>
      </div>
      <div class="form-group">
        <label>简介</label>
        <textarea class="form-input" id="rDesc" rows="2" placeholder="房型简介..."></textarea>
      </div>
      <input type="hidden" id="rEditId">
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeRoomModal()">取消</button>
      <button class="btn btn-primary" id="roomSaveBtn" onclick="saveRoom()">保存</button>
    </div>
  </div>
</div>

<!-- admin-common.js 由父框架 srcdoc 注入, 提供 YJ 全局对象 -->
<script>
// ── 使用 YJ 统一库 ──
const F = function(n){ return '¥'+Number(n||0).toLocaleString(); };
var curHotel = null, roomItems = [], hotelList = [];

// Load hotels for modal dropdown
async function loadHotels(){
  try{
    var j = await YJ.get('/api/hotels', {page_size: 100});
    hotelList = YJ.parseItems(j) || [];
  }catch(e){/* ok */}
}

function populateHotelSelect(){
  var sel = document.getElementById('rHotel');
  sel.innerHTML = '<option value="">请选择门店</option>';
  hotelList.forEach(function(h) {
    var opt = document.createElement('option');
    opt.value = h.id; opt.textContent = h.name;
    if(curHotel && h.id===curHotel) opt.selected = true;
    sel.appendChild(opt);
  });
}

async function loadRooms(hid){
  curHotel = hid||null;
  var params = {};
  if(hid) params.hotel_id = hid;
  try{
    var j = await YJ.get('/api/rooms/status', params);
    var d = j||{}, items = d.items||[];
    roomItems = items;

    // Hotel buttons
    var hotelIds = []; 
    var hotelNames = {};
    var seen = {};
    items.forEach(function(i){ 
      if(!seen[i.hotel_id]){ hotelIds.push(i.hotel_id); seen[i.hotel_id]=true; }
      hotelNames[i.hotel_id]=i.hotel_name||d.hotel_name||'门店'+i.hotel_id; 
    });
    document.getElementById('hotelBtns').innerHTML = 
      '<button class="hs-btn'+(curHotel?'':' active')+'" onclick="loadRooms()">全部门店</button>'+
      hotelIds.map(function(h){return '<button class="hs-btn'+(curHotel===h?' active':'')+'" onclick="loadRooms('+h+')">'+hotelNames[h]+'</button>';}).join('');

    // Summary
    document.getElementById('summary').innerHTML = [
      {c:'var(--success)',n:d.total_rooms,l:'总房间'},
      {c:'var(--success)',n:d.available_total,l:'空闲'},
      {c:'#faad14',n:d.booked_total,l:'已预订'},
      {c:'var(--info)',n:d.occupied_total,l:'入住中'},
      {c:'var(--warning)',n:d.cleaning_total,l:'待清洁'}
    ].map(function(s){return '<div class="summary-item-bar"><div class="n" style="color:'+s.c+'">'+s.n+'</div><div class="l">'+s.l+'</div></div>';}).join('');

    // Room cards
    document.getElementById('roomGrid').innerHTML = items.length ? items.map(function(r){
      var cls = r.available_count>r.total_count*0.5?'rc-vacant':r.occupied_count>r.total_count*0.5?'rc-occupied':r.booked_count>r.total_count*0.5?'rc-booked':'rc-mixed';
      var occRate = r.total_count > 0 ? Math.round((r.occupied_count + r.booked_count) / r.total_count * 100) : 0;
      var rateCls = occRate < 50 ? 'low' : occRate < 80 ? 'mid' : 'high';
      return '<div class="room-card-new '+cls+'">'+
        '<div class="rc-actions">'+
          '<button onclick="event.stopPropagation();openRoomModal('+r.id+')">✏️</button>'+
          '<button class="del" onclick="event.stopPropagation();deleteRoom('+r.id+',\''+(r.name||'').replace(/'/g,"\\'")+'\')">🗑️</button>'+
        '</div>'+
        '<div class="rc-name">'+r.name+'</div><div class="rc-type">'+r.room_type+' · '+F(r.price)+'/晚 · '+(r.bed_type||'')+'</div><div class="rc-stats">'+
        '<div class="rc-stat"><div class="n" style="color:var(--success);">'+r.available_count+'</div><div class="l">空闲</div></div>'+
        '<div class="rc-stat"><div class="n" style="color:#faad14;">'+r.booked_count+'</div><div class="l">预订</div></div>'+
        '<div class="rc-stat"><div class="n" style="color:var(--info);">'+r.occupied_count+'</div><div class="l">入住</div></div>'+
        '<div class="rc-stat"><div class="n" style="color:var(--warning);">'+r.cleaning_count+'</div><div class="l">清洁</div></div>'+
      '</div>'+
      '<div class="rc-progress"><div class="rc-progress-header"><span>入住率</span><span class="rate">'+occRate+'%</span></div><div class="rc-progress-bar"><div class="rc-progress-fill '+rateCls+'" style="width:'+occRate+'%;"></div></div></div>'+
      '</div>';
    }).join('') : '<div class="empty-state" style="grid-column:1/-1;"><span class="empty-icon">🚪</span><div class="empty-text">暂无房态数据</div><div class="empty-hint">选择门店后查看房态信息</div></div>';
  }catch(e){
    document.getElementById('roomGrid').innerHTML = '<div style="color:var(--error);grid-column:1/-1;text-align:center;padding:40px;">加载失败: '+e.message+'</div>';
  }
}

// ── 房型弹窗 ──────────────────────────────────────
function openRoomModal(id){
  populateHotelSelect();
  if(id){
    // Edit: fetch room detail
    YJ.get('/api/hotels/rooms/'+id).then(function(room){
      document.getElementById('roomModalTitle').textContent='编辑房型';
      document.getElementById('rEditId').value=room.id;
      document.getElementById('rHotel').value=room.hotel_id;
      document.getElementById('rName').value=room.name||'';
      document.getElementById('rType').value=room.room_type||'';
      document.getElementById('rPrice').value=room.price||'';
      document.getElementById('rTotal').value=room.total_count||10;
      document.getElementById('rAvail').value=room.available_count||10;
      document.getElementById('rArea').value=room.area||'';
      document.getElementById('rBed').value=room.bed_type||'';
      document.getElementById('rGuests').value=room.max_guests||2;
      document.getElementById('rDesc').value=room.description||'';
      document.getElementById('roomSaveBtn').textContent='更新';
      document.getElementById('roomModal').classList.add('show');
    }).catch(function(e){ YJ.toast('加载房型详情失败', 'error'); });
    return;
  }
  document.getElementById('roomModalTitle').textContent='新增房型';
  document.getElementById('rEditId').value='';
  document.getElementById('rHotel').value=curHotel||'';
  document.getElementById('rName').value='';
  document.getElementById('rType').value='';
  document.getElementById('rPrice').value='';
  document.getElementById('rTotal').value='10';
  document.getElementById('rAvail').value='10';
  document.getElementById('rArea').value='';
  document.getElementById('rBed').value='';
  document.getElementById('rGuests').value='2';
  document.getElementById('rDesc').value='';
  document.getElementById('roomSaveBtn').textContent='保存';
  document.getElementById('roomModal').classList.add('show');
}

function closeRoomModal(){
  document.getElementById('roomModal').classList.remove('show');
}

async function saveRoom(){
  var isEdit=!!document.getElementById('rEditId').value;
  var hotelId=parseInt(document.getElementById('rHotel').value);

  if(!hotelId){ YJ.toast('请选择门店', 'warning'); return; }

  var body={
    hotel_id: hotelId,
    name: document.getElementById('rName').value.trim(),
    room_type: document.getElementById('rType').value.trim(),
    price: parseFloat(document.getElementById('rPrice').value)||0,
    total_count: parseInt(document.getElementById('rTotal').value)||10,
    available_count: parseInt(document.getElementById('rAvail').value)||10,
    area: parseFloat(document.getElementById('rArea').value)||null,
    bed_type: document.getElementById('rBed').value.trim()||null,
    max_guests: parseInt(document.getElementById('rGuests').value)||2,
    description: document.getElementById('rDesc').value.trim()||null
  };

  if(!body.name){ YJ.toast('请输入房型名称', 'warning'); return; }
  if(!body.price){ YJ.toast('请输入单价', 'warning'); return; }
  if(!body.room_type){ YJ.toast('请输入房型分类', 'warning'); return; }

  try{
    if(isEdit){
      await YJ.put('/api/hotels/rooms/'+document.getElementById('rEditId').value, body);
    } else {
      await YJ.post('/api/hotels/'+hotelId+'/rooms', body);
    }
    closeRoomModal();
    loadRooms(curHotel);
    YJ.toast('保存成功', 'success');
  }catch(e){ YJ.toast('保存失败: '+e.message, 'error'); }
}

async function deleteRoom(id,name){
  if(!confirm('确定删除房型「'+name+'」？此操作不可恢复。')) return;
  try{
    await YJ.del('/api/hotels/rooms/'+id);
    loadRooms(curHotel);
    YJ.toast('已删除', 'success');
  }catch(e){ YJ.toast('删除失败: '+e.message, 'error'); }
}

YJ.init().then(function(){ loadHotels(); loadRooms(); });
</script>
</body>
</html>
