<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>设备监控</title><link rel="stylesheet" href="../css/admin.css">
<style>.page{padding:16px}.title{font-size:18px;font-weight:700;margin-bottom:16px}
.stats{display:flex;gap:12px;margin-bottom:16px}.stat{padding:14px 20px;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);flex:1;text-align:center}.stat-val{font-size:24px;font-weight:700}.stat-lbl{font-size:12px;color:#999;margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.card{background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);text-align:center}
.card-icon{font-size:28px;margin-bottom:8px}.card-name{font-size:14px;font-weight:600}.card-type{font-size:11px;color:#999}.card-status{margin-top:8px;display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600}
.status-online{background:#f6ffed;color:#389e0d}.status-offline{background:#fff2f0;color:#cf1322}.status-alert{background:#fff7e6;color:#d48806}
</style></head><body><div class="page"><div class="title">🔧 设备监控</div><div class="stats" id="stats"></div><div class="grid" id="grid"></div></div>
<script>
var ICONS={lock:'🔐',camera:'📷',smoke_sensor:'🔥',water_sensor:'💧',env_sensor:'🌡',power_meter:'⚡',door_sensor:'🚪',temp_sensor:'🌡'};
fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:'admin',password:'admin123'})})
.then(function(r){return r.json()}).then(function(j){
return fetch('/api/devices?page_size=200',{headers:{'Authorization':'Bearer '+j.access_token}})})
.then(function(r){return r.json()}).then(function(j){
var items=j.items||j.data||[];
if(!items.length){document.getElementById('grid').innerHTML='<div style=text-align:center;padding:40px;color:#999;grid-column:1/-1>暂无设备</div>';return}
var o=items.filter(function(i){return i.status==='online'}).length;
var f=items.filter(function(i){return i.status==='offline'}).length;
document.getElementById('stats').innerHTML='<div class=stat><div class=stat-val>'+items.length+'</div><div class=stat-lbl>总设备</div></div><div class=stat><div class=stat-val style=color:#389e0d>'+o+'</div><div class=stat-lbl>在线</div></div><div class=stat><div class=stat-val style=color:#cf1322>'+f+'</div><div class=stat-lbl>离线</div></div>';
var h='';
items.forEach(function(d){
h+='<div class=card><div class=card-icon>'+(ICONS[d.device_type]||'📡')+'</div><div class=card-name>'+d.name+'</div><div class=card-type>'+(d.device_type||'设备')+' · '+(d.room_number||'')+'</div><div><span class=card-status status-'+(d.status==='online'?'online':d.status==='offline'?'offline':'alert')+'>'+(d.status||'未知')+'</span></div><div style=font-size:11px;color:#999;margin-top:4px>电量 '+(d.battery||'?')+'%</div></div>';
});
document.getElementById('grid').innerHTML=h;
}).catch(function(e){document.getElementById('grid').innerHTML='<div style=text-align:center;padding:40px;color:#cf1322;grid-column:1/-1>加载失败: '+e.message+'</div>'});
</script></body></html>
