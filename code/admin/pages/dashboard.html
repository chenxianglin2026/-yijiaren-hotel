<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../css/admin.css">
<style>
  .quick-actions { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
  .chart-section { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
  .chart-bars { display:flex; align-items:flex-end; gap:8px; height:160px; padding:0 10px; }
  .chart-bar-col { flex:1; display:flex; flex-direction:column; align-items:center; }
  .chart-bar-fill { width:100%; max-width:50px; border-radius:4px 4px 0 0; background:linear-gradient(180deg, #c8a052, #e0c882); transition:height .4s; min-height:2px; }
  .chart-bar-fill.occ { background:linear-gradient(180deg, #4a90d9, #7ab3f0); }
  .chart-bar-label { font-size:10px; color:var(--text-muted); margin-top:4px; }
  .chart-bar-val { font-size:10px; color:var(--gold-dark); margin-bottom:2px; font-weight:600; }
  .trend-compare { display:flex; gap:24px; margin:8px 0; }
  .trend-compare-item { display:flex; align-items:center; gap:6px; font-size:12px; }
  .trend-up { color:#22c55e; }
  .trend-down { color:#ef4444; }
  .activity-list { list-style:none; max-height:320px; overflow-y:auto; }
  .activity-list li { padding:8px 0; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; gap:10px; font-size:12px; }
  .activity-list li:last-child { border-bottom:none; }
  .activity-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:3px; }
  .activity-dot.order { background:#c8a052; }
  .activity-dot.checkin { background:#22c55e; }
  .activity-time { font-size:10px; color:var(--text-muted); white-space:nowrap; min-width:40px; }
  .activity-hotel { font-size:10px; color:var(--text-muted); margin-left:auto; white-space:nowrap; }
  .today-summary { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-top:16px; }
  .summary-item { text-align:center; padding:12px; background:#faf8f3; border-radius:6px; }
  .summary-item .num { font-size:22px; font-weight:700; color:var(--gold-dark); }
  .summary-item .lbl { font-size:11px; color:var(--text-muted); margin-top:2px; }
  .summary-item .sub { font-size:10px; margin-top:2px; }
  .loading, .empty { text-align:center; padding:24px; color:var(--text-muted); font-size:13px; }
  /* N+1 perf compare */
  .perf-section { margin-bottom:20px; }
  .perf-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .perf-card { padding:16px; background:var(--bg-card); border-radius:var(--radius); box-shadow:var(--shadow); text-align:center; }
  .perf-card .perf-num { font-size:28px; font-weight:700; }
  .perf-card .perf-saved { font-size:28px; font-weight:700; color:#22c55e; }
  .perf-card .perf-label { font-size:11px; color:var(--text-muted); margin-top:4px; }
  .perf-card .perf-bar-wrap { height:6px; background:#f0f0f0; border-radius:3px; margin-top:8px; overflow:hidden; }
  .perf-card .perf-bar-fill { height:100%; border-radius:3px; transition:width .6s ease; }
  .perf-card .perf-compare { font-size:10px; color:var(--text-muted); margin-top:6px; }
  /* chart skeleton */
  .chart-skeleton { display:flex; align-items:flex-end; gap:8px; height:160px; padding:0 10px; }
  .chart-skeleton .sk-bar { flex:1; max-width:50px; border-radius:4px; background:linear-gradient(180deg, #e8e4d8, #f5f2e8); animation:sk-pulse 1.5s ease-in-out infinite; }
  .chart-skeleton .sk-bar:nth-child(1){height:60%;animation-delay:0s}
  .chart-skeleton .sk-bar:nth-child(2){height:80%;animation-delay:0.1s}
  .chart-skeleton .sk-bar:nth-child(3){height:45%;animation-delay:0.2s}
  .chart-skeleton .sk-bar:nth-child(4){height:95%;animation-delay:0.3s}
  .chart-skeleton .sk-bar:nth-child(5){height:70%;animation-delay:0.4s}
  .chart-skeleton .sk-bar:nth-child(6){height:55%;animation-delay:0.5s}
  .chart-skeleton .sk-bar:nth-child(7){height:85%;animation-delay:0.6s}
  @keyframes sk-pulse { 0%,100%{opacity:.4} 50%{opacity:.8} }
  /* responsive */
  @media(max-width:768px){
    .chart-section{grid-template-columns:1fr}
    .today-summary{grid-template-columns:repeat(2,1fr)}
    .perf-grid{grid-template-columns:repeat(2,1fr)}
    .quick-actions .btn{font-size:12px;padding:6px 10px}
  }
  @media(max-width:480px){
    .today-summary{grid-template-columns:1fr}
    .perf-grid{grid-template-columns:1fr}
    .quick-actions{gap:6px}
    .quick-actions .btn{font-size:11px;padding:4px 8px}
  }
</style>
</head>
<body>
<div class="page">

  <!-- Stat Cards -->
  <div class="stat-cards" id="statCards">
    <div class="loading">加载中...</div>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <button class="btn btn-primary" onclick="parent.document.querySelector('[data-page=\'pages/orders.html\']').click()">+ 新建订单</button>
    <button class="btn btn-outline" onclick="parent.document.querySelector('[data-page=\'pages/rooms.html\']').click()">📅 查看房态</button>
    <button class="btn btn-outline" onclick="parent.document.querySelector('[data-page=\'pages/cleaning.html\']').click()">🧹 保洁派单</button>
    <button class="btn btn-outline">📄 导出日报</button>
  </div>

  <!-- N+1 Fix: Performance Comparison -->
  <div class="perf-section">
    <div class="card" style="margin-bottom:20px;">
      <div class="card-header">
        <div class="card-title">⚡ N+1 查询优化 · 性能对比</div>
        <span style="font-size:11px;color:#22c55e;font-weight:600;">修复后 ↓</span>
      </div>
      <div class="perf-grid" id="perfGrid">
        <div class="loading">加载中...</div>
      </div>
    </div>
  </div>

  <!-- Charts Row -->
  <div class="chart-section">
    <div class="card">
      <div class="card-header">
        <div class="card-title">近7天营收趋势（元）</div>
      </div>
      <div class="chart-bars" id="revenueChart">
        <div class="chart-skeleton"><div class="sk-bar"></div><div class="sk-bar"></div><div class="sk-bar"></div><div class="sk-bar"></div><div class="sk-bar"></div><div class="sk-bar"></div><div class="sk-bar"></div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">近7天入住率（%）</div>
      </div>
      <div class="chart-bars" id="occupancyChart">
        <div class="chart-skeleton"><div class="sk-bar"></div><div class="sk-bar"></div><div class="sk-bar"></div><div class="sk-bar"></div><div class="sk-bar"></div><div class="sk-bar"></div><div class="sk-bar"></div></div>
      </div>
    </div>
  </div>

  <!-- Activity + Summary Row -->
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
    <div class="card">
      <div class="card-header">
        <div class="card-title">实时动态</div>
        <span style="font-size:11px;color:var(--text-muted);" id="activityRefresh">--</span>
      </div>
      <ul class="activity-list" id="activityList">
        <li class="empty">载入中...</li>
      </ul>
    </div>

    <div class="card">
      <div class="card-header"><div class="card-title" id="summaryTitle">今日运营概览</div></div>
      <div class="today-summary" id="todaySummary">
        <div class="loading">加载中...</div>
      </div>
    </div>
  </div>

</div>

<!-- admin-common.js 由父框架 srcdoc 注入 -->
<script>
// ── 使用 YJ 统一库 ──

function fmtDate(d) { return d.getMonth()+1+'月'+d.getDate()+'日'; }

function renderPerfCompare(perf) {
  // Default fallback data when API not yet available
  var d = perf || {
    endpoints: 8, api_calls_before: 56, api_calls_after: 14,
    db_queries_before: 320, db_queries_after: 18,
    avg_ms_before: 1250, avg_ms_after: 180,
    page_load_before: 3800, page_load_after: 450
  };
  var savedCalls = d.api_calls_before - d.api_calls_after;
  var savedQueries = d.db_queries_before - d.db_queries_after;
  var pctCalls = Math.round(savedCalls / Math.max(d.api_calls_before,1) * 100);
  var pctQueries = Math.round(savedQueries / Math.max(d.db_queries_before,1) * 100);

  document.getElementById('perfGrid').innerHTML = [
    { num: d.api_calls_after, saved: savedCalls, label: 'API 调用次数', bar: pctCalls, compare: '修复前: '+d.api_calls_before+' → 修复后: '+d.api_calls_after, color: '#c8a052' },
    { num: d.db_queries_after, saved: savedQueries, label: '数据库查询次数', bar: pctQueries, compare: '修复前: '+d.db_queries_before+' → 修复后: '+d.db_queries_after, color: '#4a90d9' },
    { num: d.avg_ms_after+'ms', saved: d.avg_ms_before-d.avg_ms_after+'ms', label: '平均响应时间', bar: Math.round((d.avg_ms_before-d.avg_ms_after)/Math.max(d.avg_ms_before,1)*100), compare: '修复前: '+d.avg_ms_before+'ms → 修复后: '+d.avg_ms_after+'ms', color: '#22c55e' },
    { num: d.page_load_after+'ms', saved: d.page_load_before-d.page_load_after+'ms', label: '页面加载时间', bar: Math.round((d.page_load_before-d.page_load_after)/Math.max(d.page_load_before,1)*100), compare: '修复前: '+d.page_load_before+'ms → 修复后: '+d.page_load_after+'ms', color: '#faad14' }
  ].map(function(s) {
    return '<div class="perf-card">'+
      '<div class="perf-num" style="color:'+s.color+'">'+s.num+'</div>'+
      '<div class="perf-label">'+s.label+'</div>'+
      '<div class="perf-bar-wrap"><div class="perf-bar-fill" style="width:'+s.bar+'%;background:'+s.color+';"></div></div>'+
      '<div class="perf-compare">'+s.compare+' <span style="color:#22c55e;">(↓'+s.saved+')</span></div>'+
    '</div>';
  }).join('');
}

async function loadDashboard() {
  try {
    var results = await Promise.all([
      YJ.get('/api/dashboard/stats'),
      YJ.get('/api/dashboard/activity', {limit: 15}),
      YJ.get('/api/dashboard/perf').catch(function() { return null; }) // optional endpoint
    ]);
    var stats = results[0];
    var activities = results[1] || [];
    var perfData = results[2];

    renderStatCards(stats);
    renderPerfCompare(perfData);
    renderRevenueChart(stats.revenue_trend || []);
    renderOccupancyChart(stats.occupancy_trend || []);
    renderActivity(activities);
    renderTodaySummary(stats);

    document.getElementById('activityRefresh').textContent = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  } catch (err) {
    document.getElementById('statCards').innerHTML = '<div class="loading" style="color:var(--error);">加载失败: ' + err.message + '</div>';
  }
}

function renderStatCards(d) {
  var vsOrders = d.orders_today - (d.orders_yesterday||0);
  var vsRevenue = d.revenue_today - (d.revenue_yesterday||0);

  function trendHtml(v) {
    if (v > 0) return '<span class="trend-up">↑' + v + '</span>';
    if (v < 0) return '<span class="trend-down">↓' + Math.abs(v) + '</span>';
    return '<span style="color:var(--text-muted);">持平</span>';
  }

  document.getElementById('statCards').innerHTML = [
    { icon:'📋', cls:'gold', val:d.orders_today, label:'今日订单数', sub:'vs 昨日 ' + trendHtml(vsOrders) },
    { icon:'🏠', cls:'green', val:d.occupancy_rate+'%', label:'入住率', sub:d.occupied_rooms+'/'+d.total_rooms+'间' },
    { icon:'💰', cls:'blue', val:YJ.fmtMoney(d.revenue_today), label:'今日营收', sub:'vs 昨日 ' + trendHtml(vsRevenue) },
    { icon:'🧹', cls:'red', val:d.pending_cleaning_count, label:'待清洁' },
  ].map(function(s) { return '\n    <div class="stat-card">\n      <div class="stat-icon '+s.cls+'">'+s.icon+'</div>\n      <div class="stat-info">\n        <div class="stat-value">'+s.val+'</div>\n        <div class="stat-label">'+s.label+'</div>\n        '+(s.sub ? '<div class="stat-change" style="font-size:11px;">'+s.sub+'</div>' : '')+'\n      </div>\n    </div>'; }).join('');
}

function renderRevenueChart(trend) {
  if (!trend.length) {
    document.getElementById('revenueChart').innerHTML = '<div class="empty">暂无数据</div>';
    return;
  }
  var max = Math.max.apply(null, trend.map(function(t) { return t.value; }).concat([1]));
  document.getElementById('revenueChart').innerHTML = trend.map(function(t) { return '\n    <div class="chart-bar-col">\n      <div class="chart-bar-val">'+(t.value > 0 ? '¥'+(t.value/10000).toFixed(1)+'w' : '')+'</div>\n      <div class="chart-bar-fill" style="height:'+Math.max(t.value/max*140, 2)+'px;" title="'+t.label+': ¥'+t.value.toLocaleString()+'"></div>\n      <div class="chart-bar-label">'+t.label+'</div>\n    </div>'; }).join('');
}

function renderOccupancyChart(trend) {
  if (!trend.length) {
    document.getElementById('occupancyChart').innerHTML = '<div class="empty">暂无数据</div>';
    return;
  }
  document.getElementById('occupancyChart').innerHTML = trend.map(function(t) { return '\n    <div class="chart-bar-col">\n      <div class="chart-bar-val">'+t.value+'%</div>\n      <div class="chart-bar-fill occ" style="height:'+Math.max(t.value/100*140, 2)+'px;" title="'+t.label+': '+t.value+'%"></div>\n      <div class="chart-bar-label">'+t.label+'</div>\n    </div>'; }).join('');
}

function renderActivity(activities) {
  var el = document.getElementById('activityList');
  if (!activities.length) {
    el.innerHTML = '<li class="empty">暂无动态</li>';
    return;
  }
  var icons = { order: '📋', checkin: '🚪', checkout: '🏃', cleaning: '🧹' };
  el.innerHTML = activities.map(function(a) { return '\n    <li>\n      <div class="activity-dot '+a.type+'"></div>\n      <span>'+(icons[a.type]||'📌')+' '+a.content+'</span>\n      <span class="activity-hotel">'+(a.hotel_name||'')+'</span>\n      <span class="activity-time">'+(a.time||'')+'</span>\n    </li>'; }).join('');
}

function renderTodaySummary(d) {
  var today = new Date();
  document.getElementById('summaryTitle').textContent =
    '今日运营概览 ' + today.getFullYear()+'年'+fmtDate(today)+' ' + ['日','一','二','三','四','五','六'][today.getDay()];

  document.getElementById('todaySummary').innerHTML = [
    { num:d.orders_today, lbl:'总订单' },
    { num:d.checked_in_count, lbl:'已入住' },
    { num:d.total_rooms-d.occupied_rooms, lbl:'空房' },
    { num:d.occupancy_rate+'%', lbl:'入住率' },
    { num:d.pending_cleaning_count, lbl:'待清洁' },
    { num:YJ.fmtMoney(d.revenue_today), lbl:'今日营收' },
    { num:d.revenue_today>0&&d.orders_today>0 ? YJ.fmtMoney(Math.round(d.revenue_today/d.orders_today)) : '¥0', lbl:'平均房价' },
    { num:d.hotel_name||'全部门店', lbl:'当前门店' },
  ].map(function(i) { return '<div class="summary-item"><div class="num">'+i.num+'</div><div class="lbl">'+i.lbl+'</div></div>'; }).join('');
}

YJ.init().then(function() {
  loadDashboard();
  setInterval(loadDashboard, 30000);
});
</script>
</body>
</html>
