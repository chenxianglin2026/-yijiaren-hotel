<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../css/admin.css">
<style>
  .quick-actions { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
  .chart-section { display:grid; grid-template-columns:2fr 1fr; gap:20px; }
  .alert-list { list-style:none; }
  .alert-list li { padding:10px 0; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; font-size:13px; }
  .alert-list li:last-child { border-bottom:none; }
  .alert-list .alert-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .alert-list .alert-dot.warn { background:var(--warning); }
  .alert-list .alert-dot.info { background:var(--info); }
  .alert-list .alert-dot.err { background:var(--error); }
  .alert-list .alert-time { font-size:11px; color:var(--text-muted); margin-left:auto; white-space:nowrap; }
  .progress-bar { height:8px; background:#f0f0f0; border-radius:4px; margin-top:8px; overflow:hidden; }
  .progress-bar .progress-fill { height:100%; border-radius:4px; background:linear-gradient(90deg, #c8a052, #e0c882); }
  .today-summary { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-top:16px; }
  .summary-item { text-align:center; padding:12px; background:#faf8f3; border-radius:6px; }
  .summary-item .num { font-size:22px; font-weight:700; color:var(--gold-dark); }
  .summary-item .lbl { font-size:11px; color:var(--text-muted); margin-top:2px; }
  .loading { text-align:center; padding:40px; color:var(--text-muted); }
</style>
</head>
<body>
<div class="page">

  <!-- Stat Cards -->
  <div class="stat-cards" id="statCards">
    <div class="loading">加载中...</div>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <button class="btn btn-primary" onclick="parent.document.querySelector('[data-page=\\'pages/orders.html\\']').click()">+ 新建订单</button>
    <button class="btn btn-outline" onclick="parent.document.querySelector('[data-page=\\'pages/rooms.html\\']').click()">📅 查看房态</button>
    <button class="btn btn-outline" onclick="parent.document.querySelector('[data-page=\\'pages/cleaning.html\\']').click()">🧹 保洁派单</button>
    <button class="btn btn-outline">📄 导出日报</button>
  </div>

  <!-- Chart + Alerts -->
  <div class="chart-section">
    <div class="card">
      <div class="card-header"><div class="card-title">近7天营收趋势（元）</div></div>
      <div class="chart-bar" id="revenueChart">
        <div class="loading">加载中...</div>
      </div>
      <div id="revenueSummary" style="text-align:center;margin-top:12px;font-size:12px;color:var(--text-muted);"></div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">实时报警</div>
        <span class="badge badge-error" id="alertCount">0条未处理</span>
      </div>
      <ul class="alert-list" id="alertList">
        <li style="color:var(--text-muted);">暂无报警</li>
      </ul>
    </div>
  </div>

  <!-- Today Summary -->
  <div class="card mt-md">
    <div class="card-header"><div class="card-title" id="summaryTitle">今日运营概览</div></div>
    <div class="today-summary" id="todaySummary">
      <div class="loading">加载中...</div>
    </div>
  </div>

</div>

<script>
// ---- Token helper ----
const token = localStorage.getItem('yjr_token');
const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

// ---- Format helpers ----
function fmtMoney(n) { return '¥' + Number(n || 0).toLocaleString('zh-CN', {minimumFractionDigits:0,maximumFractionDigits:0}); }
function fmtDate(d) { return d.getMonth()+1 + '月' + d.getDate() + '日'; }

// ---- Load dashboard stats ----
async function loadDashboard() {
  try {
    const res = await fetch('/api/dashboard/stats', { headers });
    const json = await res.json();
    if (json.code !== 0) throw new Error(json.msg);
    const d = json.data;

    // Stat cards
    document.getElementById('statCards').innerHTML = [
      { icon:'📋', cls:'gold', val:d.orders_today, label:'今日订单数' },
      { icon:'🏠', cls:'green', val:d.occupancy_rate + '%', label:'入住率', sub:d.occupied_rooms + '/' + d.total_rooms + '间' },
      { icon:'💰', cls:'blue', val:fmtMoney(d.revenue_today), label:'今日营收' },
      { icon:'🧹', cls:'red', val:d.pending_cleaning_count, label:'待清洁' },
    ].map(s => `
      <div class="stat-card">
        <div class="stat-icon ${s.cls}">${s.icon}</div>
        <div class="stat-info">
          <div class="stat-value">${s.val}</div>
          <div class="stat-label">${s.label}</div>
          ${s.sub ? '<div class="stat-change" style="color:var(--text-muted);">'+s.sub+'</div>' : ''}
        </div>
      </div>`).join('');

    // Today summary
    const today = new Date();
    document.getElementById('summaryTitle').textContent = '今日运营概览 ' + today.getFullYear() + '年' + fmtDate(today) + ' ' + ['日','一','二','三','四','五','六'][today.getDay()];
    document.getElementById('todaySummary').innerHTML = [
      { num:d.orders_today, lbl:'总订单' },
      { num:d.checked_in_count, lbl:'已入住' },
      { num:d.total_rooms - d.occupied_rooms, lbl:'空房' },
      { num:d.occupancy_rate + '%', lbl:'入住率' },
      { num:d.pending_cleaning_count, lbl:'待清洁' },
      { num:fmtMoney(d.revenue_today), lbl:'今日营收' },
      { num:d.revenue_today > 0 && d.orders_today > 0 ? fmtMoney(Math.round(d.revenue_today/d.orders_today)) : '¥0', lbl:'平均房价' },
      { num:d.hotel_name || '全部门店', lbl:'当前门店' },
    ].map(i => `<div class="summary-item"><div class="num">${i.num}</div><div class="lbl">${i.lbl}</div></div>`).join('');

    // Revenue chart placeholder (real chart needs history API)
    document.getElementById('revenueChart').innerHTML = 
      '<div style="display:flex;align-items:center;justify-content:center;height:180px;color:var(--text-muted);">📊 营收图表API开发中</div>';
    document.getElementById('revenueSummary').textContent = '当前入住 ' + d.checked_in_count + ' 间 | 总房间 ' + d.total_rooms + ' 间';

    // Alerts
    document.getElementById('alertCount').textContent = d.pending_cleaning_count + '条待清洁';
    document.getElementById('alertList').innerHTML = d.pending_cleaning_count > 0 
      ? '<li><span class="alert-dot warn"></span><span>有 ' + d.pending_cleaning_count + ' 间房待清洁</span><span class="alert-time">现在</span></li>'
      : '<li style="color:var(--text-muted);">暂无报警</li>';

  } catch (err) {
    document.getElementById('statCards').innerHTML = '<div class="loading" style="color:var(--error);">加载失败: ' + err.message + '</div>';
  }
}

loadDashboard();
// Auto-refresh every 60s
setInterval(loadDashboard, 60000);
</script>
</body>
</html>
