<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../css/admin.css">
<style>
  .hotel-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
  .hotel-card { background:var(--bg-card); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; position:relative; }
  .hotel-card .hc-name { font-size:18px; font-weight:700; color:var(--text-primary); }
  .hotel-card .hc-addr { font-size:13px; color:var(--text-muted); margin-top:4px; }
  .hotel-card .hc-stats { display:flex; gap:16px; margin-top:14px; padding-top:14px; border-top:1px solid var(--border); }
  .hc-stat { text-align:center; flex:1; }
  .hc-stat .n { font-size:20px; font-weight:700; color:var(--gold-dark); }
  .hc-stat .l { font-size:10px; color:var(--text-muted); }
  .hc-meta { font-size:12px; color:var(--text-muted); margin-top:8px; line-height:1.8; }
  .hc-actions { position:absolute; top:12px; right:12px; display:flex; gap:4px; opacity:0; transition:opacity .2s; }
  .hotel-card:hover .hc-actions { opacity:1; }
  .hc-actions button { background:rgba(0,0,0,.5); color:#fff; border:none; border-radius:4px; padding:2px 8px; font-size:11px; cursor:pointer; }
  .hc-actions button:hover { background:var(--gold); color:#000; }
  .hc-actions button.del:hover { background:var(--error); color:#fff; }
  @media(max-width:768px){ .hotel-cards{grid-template-columns:1fr} .hc-stats{gap:8px} .hc-stat .n{font-size:16px} }
  @media(max-width:480px){ .hotel-card{padding:14px} }
</style>
</head>
<body>
<div class="page">
  <div class="page-title">门店管理</div>

  <div class="stat-cards" id="statCards">
    <div class="loading-row" style="grid-column:1/-1;">加载中...</div>
  </div>

  <div class="filter-bar">
    <input class="form-input" id="search" placeholder="🔍 搜索门店..." style="width:220px;" oninput="render()">
    <button class="btn btn-primary btn-sm" onclick="render()">搜索</button>
    <button class="btn btn-primary btn-sm" style="margin-left:auto;" onclick="openHotelModal()">+ 新增门店</button>
  </div>

  <div class="hotel-cards" id="hotelCards"></div>
</div>

<!-- 门店新增/编辑弹窗 -->
<div class="modal-overlay" id="hotelModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="hotelModalTitle">新增门店</div>
      <button class="modal-close" onclick="closeHotelModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>门店名称 <span style="color:var(--error)">*</span></label>
        <input class="form-input" id="hName" placeholder="如: 伊家酒店(武林广场店)">
      </div>
      <div class="form-row" style="display:flex;gap:12px;">
        <div class="form-group" style="flex:1;">
          <label>城市 <span style="color:var(--error)">*</span></label>
          <input class="form-input" id="hCity" placeholder="如: 杭州">
        </div>
        <div class="form-group" style="flex:1;">
          <label>区/县</label>
          <input class="form-input" id="hDistrict" placeholder="如: 拱墅区">
        </div>
      </div>
      <div class="form-group">
        <label>详细地址 <span style="color:var(--error)">*</span></label>
        <input class="form-input" id="hAddress" placeholder="如: 武林广场1号">
      </div>
      <div class="form-group">
        <label>联系电话</label>
        <input class="form-input" id="hPhone" placeholder="如: 0571-88888888">
      </div>
      <div class="form-row" style="display:flex;gap:12px;">
        <div class="form-group" style="flex:1;">
          <label>纬度</label>
          <input class="form-input" id="hLat" type="number" step="any" placeholder="如: 30.2741">
        </div>
        <div class="form-group" style="flex:1;">
          <label>经度</label>
          <input class="form-input" id="hLng" type="number" step="any" placeholder="如: 120.1551">
        </div>
      </div>
      <div class="form-group">
        <label>封面图URL</label>
        <input class="form-input" id="hCover" placeholder="https://...">
      </div>
      <div class="form-group">
        <label>简介</label>
        <textarea class="form-input" id="hDesc" rows="2" placeholder="门店简介..."></textarea>
      </div>
      <input type="hidden" id="hEditId">
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeHotelModal()">取消</button>
      <button class="btn btn-primary" id="hotelSaveBtn" onclick="saveHotel()">保存</button>
    </div>
  </div>
</div>

<script>
const T=localStorage.getItem('yjr_token');
if(!T){window.top.location.href='pages/login.html';}
const H={'Authorization':'Bearer '+T};
const F=n=>'¥'+Number(n||0).toLocaleString();
let hotels=[],rooms=[];

// Toast notification
function toast(msg, type) {
  type = type || 'info';
  var container = document.getElementById('toastContainer');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toastContainer';
    container.className = 'toast-container';
    document.body.appendChild(container);
  }
  var t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  container.appendChild(t);
  setTimeout(function() { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(function() { t.remove(); }, 300); }, 3000);
}

async function load(){
  try{
    let [hr,rr]=await Promise.all([
      fetch('/api/hotels',{headers:H}),
      fetch('/api/rooms/status',{headers:H})
    ]);
    if (hr.status === 401 || rr.status === 401) { window.top.location.href = 'pages/login.html'; return; }
    let hj=await hr.json(),rj=await rr.json();
    hotels=(hj.data?.items||hj.data||[]);
    rooms=(rj.data?.items||rj.data||[]);
    render();
  }catch(e){ document.getElementById('hotelCards').innerHTML='<div style="color:var(--error);padding:40px;text-align:center;">加载失败: '+e.message+'</div>'; }
}

function render(){
  let q=(document.getElementById('search').value||'').toLowerCase();
  let filtered=q?hotels.filter(h=>(h.name||'').toLowerCase().includes(q)||(h.address||'').toLowerCase().includes(q)):hotels;

  let totalRooms=rooms.reduce((s,r)=>s+(r.total_count||0),0);
  document.getElementById('statCards').innerHTML=[
    {icon:'🏢',cls:'gold',val:hotels.length,label:'运营中门店'},
    {icon:'🛏️',cls:'green',val:totalRooms,label:'总客房数'},
    {icon:'🏠',cls:'blue',val:rooms.length,label:'房型数'},
    {icon:'📍',cls:'gold',val:filtered.length,label:'搜索结果'}
  ].map(s=>`<div class="stat-card"><div class="stat-icon ${s.cls}">${s.icon}</div><div class="stat-info"><div class="stat-value">${s.val}</div><div class="stat-label">${s.label}</div></div></div>`).join('');

  document.getElementById('hotelCards').innerHTML=filtered.length?filtered.map(h=>{
    let hRooms=rooms.filter(r=>r.hotel_id===h.id);
    let hTotal=hRooms.reduce((s,r)=>s+(r.total_count||0),0);
    let hOcc=hRooms.reduce((s,r)=>s+(r.occupied_count||0),0);
    let hAvail=hRooms.reduce((s,r)=>s+(r.available_count||0),0);
    return `<div class="hotel-card">
      <div class="hc-actions">
        <button onclick="event.stopPropagation();openHotelModal(${h.id})">✏️</button>
        <button class="del" onclick="event.stopPropagation();deleteHotel(${h.id},'${(h.name||'').replace(/'/g,"\\'")}')">🗑️</button>
      </div>
      <div class="hc-name">${h.name||'未命名'}</div>
      <div class="hc-addr">📍 ${h.address||'地址未填写'}</div>
      <div class="hc-meta">📞 ${h.phone||'--'} | 🛏️ ${hRooms.length}种房型</div>
      <div class="hc-stats">
        <div class="hc-stat"><div class="n">${hTotal}</div><div class="l">总房间</div></div>
        <div class="hc-stat"><div class="n" style="color:var(--success)">${hAvail}</div><div class="l">空闲</div></div>
        <div class="hc-stat"><div class="n" style="color:var(--info)">${hOcc}</div><div class="l">入住</div></div>
        <div class="hc-stat"><div class="n">${hTotal?Math.round(hOcc/hTotal*100):0}%</div><div class="l">入住率</div></div>
      </div>
    </div>`;
  }).join(''):'<div class="empty-state" style="grid-column:1/-1;"><span class="empty-icon">🏢</span><div class="empty-text">暂无门店数据</div><div class="empty-hint">点击「+ 新增门店」添加第一个门店</div></div>';
}

// ── 门店弹窗 ──────────────────────────────────────
function openHotelModal(id){
  if(id){
    let h=hotels.find(x=>x.id===id);
    if(!h) return;
    document.getElementById('hotelModalTitle').textContent='编辑门店';
    document.getElementById('hEditId').value=h.id;
    document.getElementById('hName').value=h.name||'';
    document.getElementById('hCity').value=h.city||'';
    document.getElementById('hDistrict').value=h.district||'';
    document.getElementById('hAddress').value=h.address||'';
    document.getElementById('hPhone').value=h.phone||'';
    // lat/lng might not be in list response, use approximate
    document.getElementById('hLat').value='';
    document.getElementById('hLng').value='';
    document.getElementById('hCover').value=h.cover_image||'';
    document.getElementById('hDesc').value='';
    document.getElementById('hotelSaveBtn').textContent='更新';
  } else {
    document.getElementById('hotelModalTitle').textContent='新增门店';
    document.getElementById('hEditId').value='';
    document.getElementById('hName').value='';
    document.getElementById('hCity').value='';
    document.getElementById('hDistrict').value='';
    document.getElementById('hAddress').value='';
    document.getElementById('hPhone').value='';
    document.getElementById('hLat').value='';
    document.getElementById('hLng').value='';
    document.getElementById('hCover').value='';
    document.getElementById('hDesc').value='';
    document.getElementById('hotelSaveBtn').textContent='保存';
  }
  document.getElementById('hotelModal').classList.add('show');
}

function closeHotelModal(){
  document.getElementById('hotelModal').classList.remove('show');
}

async function saveHotel(){
  let isEdit=!!document.getElementById('hEditId').value;
  let body={
    name: document.getElementById('hName').value.trim(),
    address: document.getElementById('hAddress').value.trim(),
    city: document.getElementById('hCity').value.trim(),
    district: document.getElementById('hDistrict').value.trim()||null,
    phone: document.getElementById('hPhone').value.trim()||null,
    description: document.getElementById('hDesc').value.trim()||null,
    cover_image: document.getElementById('hCover').value.trim()||null
  };
  let lat=parseFloat(document.getElementById('hLat').value);
  let lng=parseFloat(document.getElementById('hLng').value);
  if(!isNaN(lat)) body.latitude=lat;
  if(!isNaN(lng)) body.longitude=lng;

  if(!body.name){ toast('请输入门店名称', 'warning'); return; }
  if(!body.address){ toast('请输入详细地址', 'warning'); return; }
  if(!body.city){ toast('请输入城市', 'warning'); return; }

  let url=isEdit?'/api/hotels/'+document.getElementById('hEditId').value:'/api/hotels';
  let method=isEdit?'PUT':'POST';

  try{
    let r=await fetch(url,{method,headers:{...H,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.status===401){ window.top.location.href='pages/login.html'; return; }
    let j=await r.json();
    if(j.code!==0) throw new Error(j.msg||'操作失败');
    closeHotelModal();
    load();
    toast('保存成功', 'success');
  }catch(e){ toast('保存失败: '+e.message, 'error'); }
}

async function deleteHotel(id,name){
  if(!confirm('确定删除门店「'+name+'」？此操作不可恢复。')) return;
  try{
    let r=await fetch('/api/hotels/'+id,{method:'DELETE',headers:H});
    if(r.status===401){ window.top.location.href='pages/login.html'; return; }
    let j=await r.json();
    if(j.code!==0) throw new Error(j.msg||'删除失败');
    load();
    toast('已删除', 'success');
  }catch(e){ toast('删除失败: '+e.message, 'error'); }
}

load();
</script>
</body>
</html>
