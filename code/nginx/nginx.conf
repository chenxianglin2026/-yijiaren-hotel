# 伊家人酒店系统 - Nginx 反向代理配置
# 域名: www.yijiaren.com → VPS 43.163.5.90:80

upstream backend {
    server app:8000;
}

server {
    listen 80;
    server_name www.yijiaren.com localhost;

    # 日志
    access_log /var/log/nginx/yijiaren_access.log;
    error_log  /var/log/nginx/yijiaren_error.log;

    # ── 微信回调代理到宿主机 8003（需要 VPS 上单独运行 wx_v5.py）───
    # 注意：容器内访问宿主机，Linux 用 host.docker.internal 或 172.17.0.1
    location /wechat {
        proxy_pass http://host.docker.internal:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── API 请求 → FastAPI uvicorn:8000 ──────────────────────────
    location /api {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # /api 前缀传递，FastAPI 不感知 /api
        # 如果 FastAPI 路由自带 /api，则无需 rewrite
        # rewrite ^/api/(.*) /$1 break;
    }

    # ── Swagger 文档 ────────────────────────────────────────────
    location /docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── 健康检查 ────────────────────────────────────────────────
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── 管理后台静态文件 ────────────────────────────────────────
    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
