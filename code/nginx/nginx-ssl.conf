# 伊家人酒店系统 - Nginx 反向代理配置（生产版-含SSL）
# 域名: www.yijiaren.com → VPS 43.163.5.90
# 
# SSL 配置步骤:
# 1. 域名DNS解析到 43.163.5.90
# 2. 安装 certbot: apt install certbot python3-certbot-nginx
# 3. 申请证书: certbot --nginx -d www.yijiaren.com -d yijiaren.com
# 4. certbot 会自动修改此文件添加 SSL 配置
#
# 无SSL时使用 nginx.conf（仅HTTP），获取证书后切换到此配置

upstream backend {
    server app:8000;
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name www.yijiaren.com yijiaren.com localhost;
    
    # 已有证书时取消注释以下两行启用 HTTPS 重定向
    # return 301 https://$host$request_uri;
    
    # 无证书时直接代理（开发/测试阶段）
    access_log /var/log/nginx/yijiaren_access.log;
    error_log  /var/log/nginx/yijiaren_error.log;

    location /wechat {
        proxy_pass http://host.docker.internal:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

