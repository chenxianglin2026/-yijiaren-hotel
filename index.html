<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伊家人智慧酒店</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font:16px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;text-align:center;background:linear-gradient(135deg,#2b5aed,#1a3fb8);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .container{max-width:320px;width:90%}
  .logo{font-size:48px;margin-bottom:8px}
  h1{font-size:28px;font-weight:700;margin-bottom:6px;letter-spacing:2px}
  .sub{font-size:14px;opacity:.7;margin-bottom:36px}
  .btn{display:block;padding:16px 20px;margin:12px 0;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);border-radius:14px;color:#fff;text-decoration:none;font-size:16px;font-weight:500;transition:all .2s;text-align:center}
  .btn:hover{background:rgba(255,255,255,.22);transform:translateY(-1px)}
  .btn .icon{font-size:20px;margin-right:6px;vertical-align:middle}
  .btn .arrow{float:right;opacity:.5;font-size:14px;line-height:1.4}
  .footer{position:fixed;bottom:20px;left:0;right:0;font-size:12px;opacity:.5;text-align:center}
  .footer a{color:#fff;text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <div class="logo">🏨</div>
  <h1>伊家人智慧酒店</h1>
  <div class="sub">无人智慧酒店管理系统</div>

  <a class="btn" href="/admin/">
    <span class="icon">🏨</span>酒店管理后台
    <span class="arrow">›</span>
  </a>
  <a class="btn" href="/apartment/admin/">
    <span class="icon">🏢</span>公寓管理系统
    <span class="arrow">›</span>
  </a>
  <a class="btn" href="/scenic/">
    <span class="icon">🏞️</span>景区智慧系统
    <span class="arrow">›</span>
  </a>
</div>
<div class="footer">
  <a href="https://beian.miit.gov.cn" target="_blank" rel="noopener">粤ICP备16027093号-1</a>
</div>
</body>
</html>
